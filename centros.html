<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centros - PsicoFact</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none; display: flex; align-items: center;">
                <img src="img/solo_psia_peque.PNG" alt="PsicoFact Logo" class="logo-img">
                <span class="brand-name"><strong>P</strong>sico<strong>F</strong>act</span>
            </a>
        </div>
        <div class="user-info-container">
            <button class="btn-logout" id="logout-btn">Cerrar sesión</button>
            <span id="user-name"></span>
        </div>
    </header>

    <main class="container">
        <div class="agenda-container">
            <div class="agenda-header">
                <h2>Gestión de Centros</h2>
                <div class="agenda-actions">
                    <button class="btn-turquesa" style="border:none; cursor:pointer;" onclick="openModal()">+ Nuevo Centro</button>
                    <a href="index.html" class="home-icon" title="Inicio">🏠</a>
                    <a href="configuracion.html" class="back-link">&larr; Volver</a>
                </div>
            </div>

            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" class="search-input" placeholder="Buscar por nombre..." oninput="handleSearch()">
            </div>
            
            <table class="agenda-table">
                <thead>
                    <tr>
                        <th class="sortable" onclick="handleSort('nombre')">Nombre</th>
                        <th style="width: 150px;">Color</th>
                        <th style="text-align: center; width: 120px;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="centros-body"></tbody>
            </table>
        </div>
    </main>

    <!-- Modal para Centro -->
    <div id="modalCentro" class="modal">
        <div class="modal-content">
            <div class="agenda-header">
                <h2>Nuevo Centro</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <form id="form-centro" class="form-grid">
                <div class="form-group full-width">
                    <label for="nombre">Nombre del Centro</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                
                <div class="form-group full-width">
                    <label>Color Identificativo (para Agenda)</label>
                    <div class="color-palette" id="color-palette">
                        <div class="color-option" style="background-color: #3498db;" data-color="#3498db"></div>
                        <div class="color-option" style="background-color: #1abc9c;" data-color="#1abc9c"></div>
                        <div class="color-option" style="background-color: #2ecc71;" data-color="#2ecc71"></div>
                        <div class="color-option" style="background-color: #f1c40f;" data-color="#f1c40f"></div>
                        <div class="color-option" style="background-color: #e67e22;" data-color="#e67e22"></div>
                        <div class="color-option" style="background-color: #e74c3c;" data-color="#e74c3c"></div>
                        <div class="color-option" style="background-color: #9b59b6;" data-color="#9b59b6"></div>
                        <div class="color-option" style="background-color: #34495e;" data-color="#34495e"></div>
                    </div>
                    <input type="hidden" id="color" name="color" value="#3498db">
                </div>
                <div class="form-actions full-width">
                    <button type="submit" class="btn-turquesa">Guardar Centro</button>
                    <button type="button" class="back-link" style="border:none; background:none; cursor:pointer;" onclick="closeModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = window.APP_CONFIG.firebase;

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUid = null;
        const uCol = (name) => collection(db, "usuarios", currentUid, name);
        const uDoc = (name, id) => doc(db, "usuarios", currentUid, name, id);

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            currentUid = user.uid;

            // Cargar nombre del facultativo
            try {
                const snap = await getDoc(doc(db, 'usuarios', user.uid, 'facultativo', 'perfil'));
                const nameEl = document.getElementById('user-name');
                if (nameEl) {
                    if (snap.exists()) {
                        const d = snap.data();
                        const fullName = [d.nombre, d.apellidos].filter(Boolean).join(' ');
                        nameEl.textContent = fullName || user.email;
                    } else {
                        nameEl.textContent = user.email;
                    }
                }
            } catch(e) { 
                console.error("Error cargando perfil:", e);
                const nameEl = document.getElementById('user-name');
                if (nameEl) nameEl.textContent = user.email;
            }

            loadCentros();
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        function showToast(message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => container.removeChild(toast), 300);
            }, 3500);
        }

        let centros = [];
        let editingId = null;

        async function loadCentros() {
            const querySnapshot = await getDocs(uCol("centros"));
            centros = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderTable();
        }

        window.renderTable = function() {
            const tbody = document.getElementById('centros-body');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filtered = centros.filter(c => c.nombre.toLowerCase().includes(searchTerm));
            tbody.innerHTML = '';
            filtered.forEach(c => {
                const colorDot = c.color ? `<span class="clinic-color-dot" style="background-color: ${c.color}"></span>` : '';
                tbody.innerHTML += `<tr>
                    <td>${c.nombre}</td>
                    <td><div style="width: 20px; height: 20px; border-radius: 50%; background-color: ${c.color || '#3498db'}; display: inline-block; vertical-align: middle; margin-right: 10px;"></div> ${c.color || '#3498db'}</td>
                    <td style="text-align: center;">
                        <a href="javascript:void(0)" class="action-icon" onclick="editCentro('${c.id}')">✏️</a>
                        <a href="javascript:void(0)" class="action-icon" onclick="deleteCentro('${c.id}')">🗑️</a>
                    </td></tr>`;
            });
        }

        window.handleSearch = () => renderTable();
        window.handleSort = () => {}; 

        window.openModal = function(title = "Nuevo Centro") {
            const modal = document.getElementById('modalCentro');
            modal.querySelector('h2').textContent = title;
            if (title === "Nuevo Centro") { 
                document.getElementById('form-centro').reset(); 
                editingId = null; 
                selectColor('#3498db');
            }
            modal.style.display = 'flex';
        }
        window.closeModal = function() { document.getElementById('modalCentro').style.display = 'none'; }
        
        function selectColor(color) {
            document.getElementById('color').value = color;
            document.querySelectorAll('.color-option').forEach(opt => {
                if (opt.dataset.color === color) opt.classList.add('selected');
                else opt.classList.remove('selected');
            });
        }

        document.querySelectorAll('.color-option').forEach(opt => {
            opt.onclick = () => selectColor(opt.dataset.color);
        });

        window.editCentro = function(id) {
            const c = centros.find(c => c.id === id);
            editingId = id;
            document.getElementById('nombre').value = c.nombre || '';
            selectColor(c.color || '#3498db');
            openModal("Editar Centro");
        }
        
        window.deleteCentro = async function(id) { 
            if (confirm("¿Eliminar este centro?")) { 
                await deleteDoc(uDoc("centros", id));
                showToast("Centro eliminado");
                loadCentros();
            } 
        }

        document.getElementById('form-centro').onsubmit = async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            if (editingId) {
                await updateDoc(uDoc("centros", editingId), data);
                showToast("Centro actualizado");
            } else {
                await addDoc(uCol("centros"), data);
                showToast("Centro guardado");
            }
            loadCentros(); closeModal();
        };

        window.onclick = (e) => { if (e.target == document.getElementById('modalCentro')) closeModal(); }
    </script>
</body>
</html>
