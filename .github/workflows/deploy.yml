name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # cambia a "master" si tu rama principal se llama así
  workflow_dispatch:   # permite lanzarla manualmente desde GitHub Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from secrets
        env:
          FIREBASE_API_KEY:            ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:        ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:         ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:     ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:             ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_MEASUREMENT_ID:     ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          GROQ_API_KEY:                ${{ secrets.GROQ_API_KEY }}
        run: |
          python3 -c "
          import os
          content = '''window.APP_CONFIG = {
              firebase: {
                  apiKey:            \"{apiKey}\",
                  authDomain:        \"{authDomain}\",
                  projectId:         \"{projectId}\",
                  storageBucket:     \"{storageBucket}\",
                  messagingSenderId: \"{messagingSenderId}\",
                  appId:             \"{appId}\",
                  measurementId:     \"{measurementId}\"
              },
              groqApiKey: \"{groqApiKey}\"
          };'''.format(
              apiKey=os.environ['FIREBASE_API_KEY'],
              authDomain=os.environ['FIREBASE_AUTH_DOMAIN'],
              projectId=os.environ['FIREBASE_PROJECT_ID'],
              storageBucket=os.environ['FIREBASE_STORAGE_BUCKET'],
              messagingSenderId=os.environ['FIREBASE_MESSAGING_SENDER_ID'],
              appId=os.environ['FIREBASE_APP_ID'],
              measurementId=os.environ['FIREBASE_MEASUREMENT_ID'],
              groqApiKey=os.environ['GROQ_API_KEY']
          )
          open('js/config.js', 'w').write(content)
          print('config.js generated OK')
          "
          cat js/config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
