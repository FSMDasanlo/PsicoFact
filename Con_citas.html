<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas de Citas</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none; display: flex; align-items: center;">
                <img src="img/solo_psia_peque.PNG" alt="Logo" class="logo-img">
            </a>
        </div>
        <div class="user-info-container">
            <button class="btn-logout" id="logout-btn">Cerrar sesión</button>
            <span id="user-name"></span>
        </div>
    </header>

    <main class="container">
        <div class="agenda-header" style="text-align: left;">
            <h2>Consultas de citas</h2>
            <div class="agenda-actions">
                <a href="index.html" class="home-icon" title="Inicio">🏠</a>
                <a href="consultas.html" class="back-link">&larr; Volver</a>
            </div>
        </div>

        <!-- Tarjeta de Filtros -->
        <section class="agenda-container" style="margin-bottom: 2rem;">
            <h3 style="color: var(--azul-oscuro); margin-bottom: 1rem;">Filtros y Navegación</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                <button class="btn-turquesa" onclick="filterByMonth(-1)">Mes anterior</button>
                <button class="btn-turquesa" onclick="filterByMonth(0)">Mes Actual</button>
                <button class="btn-turquesa" onclick="filterByMonth(1)">Próximo mes</button>
            </div>

            <form id="form-filtros-citas" class="form-grid">
                <div class="form-group">
                    <label for="fecha-desde">Desde</label>
                    <input type="date" id="fecha-desde">
                </div>
                <div class="form-group">
                    <label for="fecha-hasta">Hasta</label>
                    <input type="date" id="fecha-hasta">
                </div>
                <div class="form-group">
                    <label for="filtro-clinica">Clínica</label>
                    <select id="filtro-clinica">
                        <option value="">Todas las clínicas</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="filtro-sociedad">Sociedad</label>
                    <select id="filtro-sociedad">
                        <option value="">Todas las sociedades</option>
                    </select>
                </div>
                <div class="form-actions full-width" style="align-items: flex-end;">
                    <button type="button" class="btn-turquesa" style="flex: 1; cursor: pointer;" onclick="handleSearch()">Buscar</button>
                    <button type="button" class="back-link" style="border:none; background:none; cursor:pointer;" onclick="clearFilters()">Limpiar</button>
                </div>
            </form>
        </section>

        <!-- Resumen Financiero/Operativo -->
        <section id="resumen-citas" class="agenda-container" style="margin-bottom: 2rem; background-color: #f1faff; border-left: 5px solid var(--azul-primario); display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
            <!-- Se rellena con JS -->
        </section>

        <!-- Tabla de Resultados -->
        <section class="agenda-container">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
                <h3 style="color: var(--azul-oscuro); margin:0;">Resultados de Citas</h3>
                <div id="ia-trigger" onclick="toggleIAChat()" style="cursor:pointer; background:#f0f7ff; padding:8px; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; border:1px solid #3498db; transition:all 0.3s; color:#3498db;" title="Preguntar a la IA">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 2a10 10 0 0 1 10 10M12 2a10 10 0 0 0-10 10"></path>
                        <path d="M12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"></path>
                        <path d="M12 12l3 3m-3-3l-3-3m3 3l3-3m-3 3l-3 3"></path>
                    </svg>
                </div>
            </div>

            <!-- Chat IA -->
            <div id="ia-chat" style="display:none; margin-bottom:1.5rem; background:#f0f7ff; border:1px solid #3498db; border-radius:8px; padding:15px;">
                <div style="font-size:0.8rem; font-weight:600; color:#2980b9; margin-bottom:8px; display:flex; align-items:center; gap:5px;">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;">
                        <circle cx="12" cy="12" r="10"></circle>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg> Asistente IA de Citas
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="ia-input" placeholder="Ej: ¿Cuántas citas hay completadas? o ¿Quién es el paciente más frecuente?" style="flex:1; padding:8px; border:1px solid #ccc; border-radius:4px; font-size:0.9rem;">
                    <button onclick="askIA()" id="ia-btn" class="btn-turquesa" style="padding:8px 15px;">Preguntar</button>
                </div>
                <div id="ia-response" style="margin-top:10px; font-size:0.85rem; line-height:1.4; color:#2c3e50; border-top:1px solid #d6eaf8; padding-top:10px; display:none;"></div>
            </div>

            <table class="agenda-table">
                <thead>
                    <tr>
                        <th onclick="window.sortTable('fecha')" style="cursor:pointer;">Fecha ↕️</th>
                        <th onclick="window.sortTable('paciente')" style="cursor:pointer;">Referencia / Paciente ↕️</th>
                        <th onclick="window.sortTable('clinica')" style="cursor:pointer;">Clínica ↕️</th>
                        <th onclick="window.sortTable('sociedad')" style="cursor:pointer;">Sociedad ↕️</th>
                        <th onclick="window.sortTable('importe')" style="cursor:pointer;">Total Clínica ↕️</th>
                        <th onclick="window.sortTable('importe_facultativo')" style="cursor:pointer;">Importe PS ↕️</th>
                        <th onclick="window.sortTable('estado')" style="cursor:pointer;">Estado ↕️</th>
                    </tr>
                </thead>
                <tbody id="resultados-citas">
                    <!-- Se rellena con JS -->
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 PsicoFact - Gestión de Psicología</p>
    </footer>

    <script src="js/config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = window.APP_CONFIG.firebase;

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUid = null;
        let appointments = [];
        const uCol = (name) => collection(db, "usuarios", currentUid, name);

        window.toggleIAChat = () => {
            const chat = document.getElementById('ia-chat');
            chat.style.display = chat.style.display === 'none' ? 'block' : 'none';
        };

        window.askIA = async () => {
            const input = document.getElementById('ia-input');
            const respDiv = document.getElementById('ia-response');
            const btn = document.getElementById('ia-btn');
            const question = input.value.trim();
            if (!question || appointments.length === 0) return;

            btn.disabled = true;
            respDiv.style.display = 'block';
            respDiv.innerHTML = '<em>Analizando citas...</em>';

            try {
                const filteredDataForIA = appointments.map(a => ({
                    fecha: a.fecha,
                    paciente: a.referenciaPaciente || a.paciente,
                    clinica: a.clinica,
                    sociedad: a.sociedad,
                    importe_ps: a.importe_facultativo,
                    estado: a.estado
                }));

                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${window.APP_CONFIG.groqApiKey}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            { role: 'system', content: 'Eres un asistente analista de citas de psicología. Responde de forma breve y clara en español basándote en los datos JSON proporcionados.' },
                            { role: 'user', content: `Datos de citas actuales: ${JSON.stringify(filteredDataForIA)}\n\nPregunta: ${question}` }
                        ],
                        temperature: 0.1
                    })
                });
                const data = await response.json();
                respDiv.innerHTML = data.choices[0].message.content.replace(/\n/g, '<br>');
            } catch (err) {
                respDiv.innerHTML = "Error: " + err.message;
            } finally { btn.disabled = false; }
        };

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const [year, month, day] = dateStr.split('-');
            return `${day}-${month}-${year}`;
        }

        function showToast(message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => container.removeChild(toast), 300);
            }, 3500);
        }

        async function loadFilters() {
            const snapshotClinicas = await getDocs(query(uCol("clinicas"), orderBy("nombre")));
            const snapshotSociedades = await getDocs(query(uCol("sociedades"), orderBy("nombre")));
            
            const selectClinica = document.getElementById('filtro-clinica');
            const selectSociedad = document.getElementById('filtro-sociedad');

            snapshotClinicas.forEach(c => {
                selectClinica.innerHTML += `<option value="${c.data().nombre}">${c.data().nombre}</option>`;
            });
            snapshotSociedades.forEach(s => {
                selectSociedad.innerHTML += `<option value="${s.data().nombre}">${s.data().nombre}</option>`;
            });
        }

        let currentSortField = 'fecha';
        let currentSortOrder = 'desc';

        window.sortTable = function(field) {
            if (currentSortField === field) {
                currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortField = field;
                currentSortOrder = 'asc';
            }
            renderData(appointments);
        };

        async function loadAppointments() {
            const snap = await getDocs(uCol("citas"));
            appointments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            filterByMonth(0);
        }

        window.handleSearch = () => {
            const clinica = document.getElementById('filtro-clinica').value;
            const sociedad = document.getElementById('filtro-sociedad').value;

            const filtered = appointments.filter(a => {
                const matchClinica = !clinica || a.clinica === clinica;
                const matchSociedad = !sociedad || a.sociedad === sociedad;
                return matchClinica && matchSociedad;
            });

            renderData(filtered);
        };

        function renderData(data) {
            const tbody = document.getElementById('resultados-citas');
            const resumen = document.getElementById('resumen-citas');
            tbody.innerHTML = '';
            
            // Ordenar datos
            data.sort((a, b) => {
                let valA = a[currentSortField] || '';
                let valB = b[currentSortField] || '';

                if (currentSortField === 'fecha') {
                    valA = `${a.fecha}T${a.hora || '00:00'}`;
                    valB = `${b.fecha}T${b.hora || '00:00'}`;
                }

                if (typeof valA === 'string') {
                    return currentSortOrder === 'asc' 
                        ? valA.localeCompare(valB, undefined, {numeric: true, sensitivity: 'base'}) 
                        : valB.localeCompare(valA, undefined, {numeric: true, sensitivity: 'base'});
                } else {
                    return currentSortOrder === 'asc' ? valA - valB : valB - valA;
                }
            });

            let realizadas = 0, importePagado = 0, pendientes = 0, importePendiente = 0;

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align: center; color: #95a5a6;">No hay citas para este periodo</td></tr>`;
            } else {
                data.forEach(app => {
                    const isDone = app.estado === 'completed';
                    const isCancelled = app.estado === 'cancelled';
                    // Usamos el campo importe_facultativo para el cálculo financiero real
                    const importePS = isCancelled ? 0 : (parseFloat(app.importe_facultativo) || 0);
                    
                    if (isDone) {
                        realizadas++;
                        importePagado += importePS;
                    } else if (!isCancelled) {
                        pendientes++;
                        importePendiente += importePS;
                    }

                    const statusLabel = app.estado === 'completed' ? 'Realizada' : (app.estado === 'cancelled' ? 'Cancelada' : 'Pendiente');

                    tbody.innerHTML += `
                        <tr class="${isCancelled ? 'row-cancelled' : ''}">
                            <td>${formatDate(app.fecha)}</td>
                            <td><strong>${app.referenciaPaciente || app.paciente}</strong></td>
                            <td>${app.clinica}</td>
                            <td>${app.sociedad}</td>
                            <td style="color: #666; font-size: 0.85em;">${(parseFloat(app.importe) || 0).toFixed(2)} €</td>
                            <td style="font-weight: 600; color: var(--azul-oscuro);">${importePS.toFixed(2)} €</td>
                            <td><span class="status-pill ${app.estado}">${statusLabel}</span></td>
                        </tr>`;
                });
            }

            resumen.innerHTML = `
                <div><small>Sesiones Realizadas</small><br><strong>${realizadas}</strong></div>
                <div><small>Mis Honorarios (Cobrado)</small><br><strong>${importePagado.toFixed(2)} €</strong></div>
                <div><small>Sesiones Pendientes</small><br><strong>${pendientes}</strong></div>
                <div><small>Honorarios Pendientes</small><br><strong>${importePendiente.toFixed(2)} €</strong></div>
            `;
        }
        window.renderData = renderData;

        function filterByMonth(offset) {
            const now = new Date();
            const targetDate = new Date(now.getFullYear(), now.getMonth() + offset, 1);
            const year = targetDate.getFullYear();
            const month = targetDate.getMonth();
            
            const filtered = appointments.filter(app => {
                if (!app.fecha) return false;
                const parts = String(app.fecha).split('-');
                const appYear = parseInt(parts[0]);
                const appMonth = parseInt(parts[1]) - 1; // 0-indexed
                return appYear === year && appMonth === month;
            });
            renderData(filtered);
        }
        window.filterByMonth = filterByMonth;

        function handleSearch() {
            const desde = document.getElementById('fecha-desde').value;
            const hasta = document.getElementById('fecha-hasta').value;
            const clinicaFiltro = document.getElementById('filtro-clinica').value;
            const sociedadFiltro = document.getElementById('filtro-sociedad').value;
            
            const filtered = appointments.filter(app => {
                if (!app.fecha) return false;
                // Usamos split para evitar desfases de horas/zonas horarias en la comparación
                const parts = String(app.fecha).split('-');
                const d = new Date(parts[0], parts[1] - 1, parts[2]);

                let cumpleFecha = true;
                if (desde && hasta) {
                    const dDesde = new Date(desde);
                    const dHasta = new Date(hasta);
                    cumpleFecha = d >= dDesde && d <= dHasta;
                }

                const cumpleClinica = clinicaFiltro === "" || app.clinica === clinicaFiltro;
                const cumpleSociedad = sociedadFiltro === "" || app.sociedad === sociedadFiltro;
                
                return cumpleFecha && cumpleClinica && cumpleSociedad;
            });
            renderData(filtered);
        }
        window.handleSearch = handleSearch;

        function clearFilters() {
            document.getElementById('form-filtros-citas').reset();
            renderData([]);
        }
        window.clearFilters = clearFilters;

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            currentUid = user.uid;

            // Cargar nombre del facultativo
            try {
                const snap = await getDoc(doc(db, 'usuarios', user.uid, 'facultativo', 'perfil'));
                const nameEl = document.getElementById('user-name');
                if (nameEl) {
                    if (snap.exists()) {
                        const d = snap.data();
                        const fullName = [d.nombre, d.apellidos].filter(Boolean).join(' ');
                        nameEl.textContent = fullName || user.email;
                    } else {
                        nameEl.textContent = user.email;
                    }
                }
            } catch(e) { 
                console.error("Error cargando perfil:", e);
                const nameEl = document.getElementById('user-name');
                if (nameEl) nameEl.textContent = user.email;
            }

            loadFilters();
            loadAppointments();
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
    </script>
</body>
</html>
