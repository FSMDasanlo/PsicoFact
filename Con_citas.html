<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas de Citas - PsicoFact</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none;">
                <span class="brand-name"><strong>P</strong>sico<strong>F</strong>act</span>
            </a>
        </div>
        <div class="header-date" id="current-date"></div>
    </header>

    <main class="container">
        <div class="agenda-header" style="text-align: left;">
            <h2>Consultas de citas</h2>
            <a href="consultas.html" class="back-link">&larr; Volver</a>
        </div>

        <!-- Tarjeta de Filtros -->
        <section class="agenda-container" style="margin-bottom: 2rem;">
            <h3 style="color: var(--azul-oscuro); margin-bottom: 1rem;">Filtros y Navegación</h3>
            <div style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                <button class="btn-turquesa" onclick="filterByMonth(-1)">Mes anterior</button>
                <button class="btn-turquesa" onclick="filterByMonth(0)">Mes Actual</button>
                <button class="btn-turquesa" onclick="filterByMonth(1)">Próximo mes</button>
            </div>

            <form id="form-filtros-citas" class="form-grid">
                <div class="form-group">
                    <label for="fecha-desde">Desde</label>
                    <input type="date" id="fecha-desde">
                </div>
                <div class="form-group">
                    <label for="fecha-hasta">Hasta</label>
                    <input type="date" id="fecha-hasta">
                </div>
                <div class="form-group">
                    <label for="filtro-clinica">Clínica</label>
                    <select id="filtro-clinica">
                        <option value="">Todas las clínicas</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="filtro-sociedad">Sociedad</label>
                    <select id="filtro-sociedad">
                        <option value="">Todas las sociedades</option>
                    </select>
                </div>
                <div class="form-actions full-width" style="align-items: flex-end;">
                    <button type="button" class="btn-turquesa" style="flex: 1; cursor: pointer;" onclick="handleSearch()">Buscar</button>
                    <button type="button" class="back-link" style="border:none; background:none; cursor:pointer;" onclick="clearFilters()">Limpiar</button>
                </div>
            </form>
        </section>

        <!-- Resumen Financiero/Operativo -->
        <section id="resumen-citas" class="agenda-container" style="margin-bottom: 2rem; background-color: #f1faff; border-left: 5px solid var(--azul-primario); display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
            <!-- Se rellena con JS -->
        </section>

        <!-- Tabla de Resultados -->
        <section class="agenda-container">
            <table class="agenda-table">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Paciente</th>
                        <th>Clínica</th>
                        <th>Sociedad</th>
                        <th>Importe</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="resultados-citas">
                    <!-- Se rellena con JS -->
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 PsicoFact - Gestión de Psicología</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUgTAvRE0IhFq3snlwPIwTkZn7eJU6Tyk",
            authDomain: "psicofact-404ba.firebaseapp.com",
            projectId: "psicofact-404ba",
            storageBucket: "psicofact-404ba.firebasestorage.app",
            messagingSenderId: "216824213435",
            appId: "1:216824213435:web:282a094dbf842db8719e9e",
            measurementId: "G-CNG232R6TW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function loadFilters() {
            const snapshotClinicas = await getDocs(query(collection(db, "clinicas"), orderBy("nombre")));
            const snapshotSociedades = await getDocs(query(collection(db, "sociedades"), orderBy("nombre")));
            
            const selectClinica = document.getElementById('filtro-clinica');
            const selectSociedad = document.getElementById('filtro-sociedad');

            snapshotClinicas.forEach(c => {
                selectClinica.innerHTML += `<option value="${c.data().nombre}">${c.data().nombre}</option>`;
            });
            snapshotSociedades.forEach(s => {
                selectSociedad.innerHTML += `<option value="${s.data().nombre}">${s.data().nombre}</option>`;
            });
        }
        loadFilters();

        const dateElement = document.getElementById('current-date');
        dateElement.textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        let appointments = [];

        async function loadAppointments() {
            const snap = await getDocs(collection(db, "citas"));
            appointments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            window.filterByMonth(0);
        }

        window.renderData = function(data) {
            const tbody = document.getElementById('resultados-citas');
            const resumen = document.getElementById('resumen-citas');
            tbody.innerHTML = '';

            let realizadas = 0, importePagado = 0, pendientes = 0, importePendiente = 0;

            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" style="text-align: center; color: #95a5a6;">No hay citas para este periodo</td></tr>`;
            } else {
                data.sort((a, b) => new Date(a.fecha) - new Date(b.fecha));
                data.forEach(app => {
                    const isDone = app.estado === 'completed';
                    if (isDone) {
                        realizadas++;
                        importePagado += parseFloat(app.importe) || 0;
                    } else {
                        pendientes++;
                        importePendiente += parseFloat(app.importe) || 0;
                    }

                    tbody.innerHTML += `
                        <tr>
                            <td>${app.fecha}</td>
                            <td>${app.paciente}</td>
                            <td>${app.clinica}</td>
                            <td>${app.sociedad}</td>
                            <td>${app.importe.toFixed(2)} €</td>
                            <td><span class="status-pill ${app.estado}">${app.estado === 'completed' ? 'Realizada' : 'Pendiente'}</span></td>
                        </tr>`;
                });
            }

            resumen.innerHTML = `
                <div><small>Sesiones Realizadas</small><br><strong>${realizadas}</strong></div>
                <div><small>Total Pagado</small><br><strong>${importePagado.toFixed(2)} €</strong></div>
                <div><small>Sesiones Pendientes</small><br><strong>${pendientes}</strong></div>
                <div><small>Importe Pendiente</small><br><strong>${importePendiente.toFixed(2)} €</strong></div>
            `;
        }

        window.filterByMonth = function(offset) {
            const now = new Date();
            const targetDate = new Date(now.getFullYear(), now.getMonth() + offset, 1);
            const year = targetDate.getFullYear();
            const month = targetDate.getMonth();
            
            const filtered = appointments.filter(app => {
                const parts = app.fecha.split('-');
                const appYear = parseInt(parts[0]);
                const appMonth = parseInt(parts[1]) - 1; // 0-indexed
                return appYear === year && appMonth === month;
            });
            renderData(filtered);
        }

        window.handleSearch = function() {
            const desde = document.getElementById('fecha-desde').value;
            const hasta = document.getElementById('fecha-hasta').value;
            const clinicaFiltro = document.getElementById('filtro-clinica').value;
            const sociedadFiltro = document.getElementById('filtro-sociedad').value;
            
            const filtered = appointments.filter(app => {
                // Usamos split para evitar desfases de horas/zonas horarias en la comparación
                const parts = app.fecha.split('-');
                const d = new Date(parts[0], parts[1] - 1, parts[2]);

                let cumpleFecha = true;
                if (desde && hasta) {
                    const dDesde = new Date(desde);
                    const dHasta = new Date(hasta);
                    cumpleFecha = d >= dDesde && d <= dHasta;
                }

                const cumpleClinica = clinicaFiltro === "" || app.clinica === clinicaFiltro;
                const cumpleSociedad = sociedadFiltro === "" || app.sociedad === sociedadFiltro;
                
                return cumpleFecha && cumpleClinica && cumpleSociedad;
            });
            renderData(filtered);
        }

        window.clearFilters = function() {
            document.getElementById('form-filtros-citas').reset();
            window.renderData([]);
        }

        loadAppointments();
    </script>
</body>
</html>
