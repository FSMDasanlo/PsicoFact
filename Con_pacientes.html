<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas de pacientes</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none; display: flex; align-items: center;">
                <img src="img/Psia.png" alt="Logo" class="logo-img">
            </a>
        </div>
        <div class="user-info-container">
            <button class="btn-logout" id="logout-btn">Cerrar sesión</button>
            <span id="user-name"></span>
        </div>
    </header>

    <main class="container">
        <div class="agenda-header" style="text-align: left;">
            <h2>Consultas de pacientes</h2>
            <div class="agenda-actions">
                <a href="index.html" class="home-icon" title="Inicio">🏠</a>
                <a href="consultas.html" class="back-link">&larr; Volver</a>
            </div>
        </div>

        <!-- Tarjeta de Filtros de Búsqueda -->
        <section class="agenda-container" style="margin-bottom: 2rem;">
            <h3 style="color: var(--azul-oscuro); margin-bottom: 1rem;">Filtros de búsqueda</h3>
            <form id="form-busqueda" class="form-grid">
                <div class="form-group">
                    <label for="filtro-nombre">Nombre o Apellidos</label>
                    <input type="text" id="filtro-nombre" placeholder="Ej: Juan Pérez">
                </div>
                <div class="form-group">
                    <label for="filtro-clinica">Clínica</label>
                    <select id="filtro-clinica">
                        <option value="">Todas las clínicas</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="filtro-sociedad">Sociedad</label>
                    <select id="filtro-sociedad">
                        <option value="">Todas las sociedades</option>
                    </select>
                </div>
                <div class="form-actions" style="align-items: flex-end;">
                    <button type="button" class="btn-turquesa" style="flex: 1; cursor: pointer;" onclick="handleSearch()">Buscar</button>
                    <button type="button" class="back-link" style="border:none; background:none; cursor:pointer;" onclick="clearFilters()">Limpiar</button>
                </div>
            </form>
        </section>

        <!-- Tabla de Resultados -->
        <section class="agenda-container">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
                <h3 style="color: var(--azul-oscuro); margin:0;">Resultados</h3>
                <div id="ia-trigger" onclick="toggleIAChat()" style="cursor:pointer; background:#f0f7ff; padding:8px; border-radius:50%; width:36px; height:36px; display:flex; align-items:center; justify-content:center; border:1px solid #3498db; transition:all 0.3s; color:#3498db;" title="Preguntar a la IA">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <path d="M12 2a10 10 0 0 1 10 10M12 2a10 10 0 0 0-10 10"></path>
                        <path d="M12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8z"></path>
                        <path d="M12 12l3 3m-3-3l-3-3m3 3l3-3m-3 3l-3 3"></path>
                    </svg>
                </div>
            </div>

            <!-- Chat IA -->
            <div id="ia-chat" style="display:none; margin-bottom:1.5rem; background:#f0f7ff; border:1px solid #3498db; border-radius:8px; padding:15px;">
                <div style="font-size:0.8rem; font-weight:600; color:#2980b9; margin-bottom:8px; display:flex; align-items:center; gap:5px;">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;">
                        <circle cx="12" cy="12" r="10"></circle>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg> Asistente IA de Pacientes
                </div>
                <div style="display:flex; gap:10px;">
                    <input type="text" id="ia-input" placeholder="Ej: ¿Qué pacientes son de Sanitas? o ¿Cuál es el importe medio?" style="flex:1; padding:8px; border:1px solid #ccc; border-radius:4px; font-size:0.9rem;">
                    <button onclick="askIA()" id="ia-btn" class="btn-turquesa" style="padding:8px 15px;">Preguntar</button>
                </div>
                <div id="ia-response" style="margin-top:10px; font-size:0.85rem; line-height:1.4; color:#2c3e50; border-top:1px solid #d6eaf8; padding-top:10px; display:none;"></div>
            </div>

            <table class="agenda-table">
                <thead>
                    <tr>
                        <th class="sortable" onclick="handleSort('nombre_completo')">Nombre Paciente ↕️</th>
                        <th class="sortable" onclick="handleSort('sociedad')">Sociedad ↕️</th>
                        <th class="sortable" onclick="handleSort('clinica')">Clínica ↕️</th>
                        <th class="sortable" onclick="handleSort('importe_sesion')" style="text-align: right; width: 100px;">Importe ↕️</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="resultados-busqueda">
                    <tr>
                        <td colspan="5" style="text-align: center; color: #95a5a6;">Use los filtros para buscar pacientes</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 PsicoFact - Gestión de Psicología</p>
    </footer>

    <script src="js/config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, orderBy, query, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = window.APP_CONFIG.firebase;

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUid = null;
        let patients = [];
        const uCol = (name) => collection(db, "usuarios", currentUid, name);

        let currentSortField = 'nombre_completo';
        let currentSortOrder = 'asc';
        let lastFilteredList = [];

        window.toggleIAChat = () => {
            const chat = document.getElementById('ia-chat');
            chat.style.display = chat.style.display === 'none' ? 'block' : 'none';
        };

        window.askIA = async () => {
            const input = document.getElementById('ia-input');
            const respDiv = document.getElementById('ia-response');
            const btn = document.getElementById('ia-btn');
            const question = input.value.trim();
            if (!question || lastFilteredList.length === 0) return;

            btn.disabled = true;
            respDiv.style.display = 'block';
            respDiv.innerHTML = '<em>Analizando pacientes...</em>';

            try {
                const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${window.APP_CONFIG.groqApiKey}`
                    },
                    body: JSON.stringify({
                        model: 'llama-3.3-70b-versatile',
                        messages: [
                            { role: 'system', content: 'Eres un asistente analista de pacientes. Responde de forma muy breve y clara en español basándote en los datos JSON proporcionados.' },
                            { role: 'user', content: `Datos de pacientes filtrados: ${JSON.stringify(lastFilteredList)}\n\nPregunta: ${question}` }
                        ],
                        temperature: 0.1
                    })
                });
                const data = await response.json();
                respDiv.innerHTML = data.choices[0].message.content.replace(/\n/g, '<br>');
            } catch (err) {
                respDiv.innerHTML = "Error: " + err.message;
            } finally { btn.disabled = false; }
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            currentUid = user.uid;

            // Cargar nombre del facultativo
            try {
                const snap = await getDoc(doc(db, 'usuarios', user.uid, 'facultativo', 'perfil'));
                const nameEl = document.getElementById('user-name');
                if (nameEl) {
                    if (snap.exists()) {
                        const d = snap.data();
                        const fullName = [d.nombre, d.apellidos].filter(Boolean).join(' ');
                        nameEl.textContent = fullName || user.email;
                    } else {
                        nameEl.textContent = user.email;
                    }
                }
            } catch(e) { 
                console.error("Error cargando perfil:", e);
                const nameEl = document.getElementById('user-name');
                if (nameEl) nameEl.textContent = user.email;
            }

            loadFilters();
            loadData();
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        async function loadData() {
            try {
                const querySnapshot = await getDocs(uCol("pacientes"));
                patients = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // No renderizamos nada hasta que el usuario busque (según el marcador de posición)
            } catch (error) {
                console.error("Error cargando pacientes:", error);
            }
        }

        async function loadFilters() {
            const snapshotClinicas = await getDocs(query(uCol("clinicas"), orderBy("nombre")));
            const snapshotSociedades = await getDocs(query(uCol("sociedades"), orderBy("nombre")));
            
            const selectClinica = document.getElementById('filtro-clinica');
            const selectSociedad = document.getElementById('filtro-sociedad');

            snapshotClinicas.forEach(c => {
                selectClinica.innerHTML += `<option value="${c.data().nombre}">${c.data().nombre}</option>`;
            });
            snapshotSociedades.forEach(s => {
                selectSociedad.innerHTML += `<option value="${s.data().nombre}">${s.data().nombre}</option>`;
            });
        }

        function handleSearch() {
            const nombreFiltro = document.getElementById('filtro-nombre').value.toLowerCase();
            const clinicaFiltro = document.getElementById('filtro-clinica').value;
            const sociedadFiltro = document.getElementById('filtro-sociedad').value;

            lastFilteredList = patients.filter(p => {
                const fullName = `${p.nombre || ''} ${p.apellidos || ''}`.toLowerCase();
                const cumpleNombre = nombreFiltro === "" || fullName.includes(nombreFiltro);
                const cumpleClinica = clinicaFiltro === "" || p.clinica === clinicaFiltro;
                const cumpleSociedad = sociedadFiltro === "" || p.sociedad === sociedadFiltro;
                return cumpleNombre && cumpleClinica && cumpleSociedad;
            });

            handleSort(currentSortField, true);
        }

        function handleSort(field, keepOrder = false) {
            if (!keepOrder) {
                if (currentSortField === field) {
                    currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
                } else {
                    currentSortField = field;
                    currentSortOrder = 'asc';
                }
            }

            lastFilteredList.sort((a, b) => {
                let valA, valB;

                if (field === 'nombre_completo') {
                    valA = `${a.nombre} ${a.apellidos}`.toLowerCase();
                    valB = `${b.nombre} ${b.apellidos}`.toLowerCase();
                } else if (field === 'importe_sesion') {
                    valA = parseFloat(a.importe_sesion) || 0;
                    valB = parseFloat(b.importe_sesion) || 0;
                } else {
                    valA = (a[field] || '').toString().toLowerCase();
                    valB = (b[field] || '').toString().toLowerCase();
                }

                if (valA < valB) return currentSortOrder === 'asc' ? -1 : 1;
                if (valA > valB) return currentSortOrder === 'asc' ? 1 : -1;
                return 0;
            });

            renderResults(lastFilteredList);
        }

        function renderResults(lista) {
            const tbody = document.getElementById('resultados-busqueda');
            if (lista.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #95a5a6;">No se encontraron pacientes</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            lista.forEach(p => {
                const importe = parseFloat(p.importe_sesion || 0);
                tbody.innerHTML += `
                    <tr>
                        <td>${p.nombre} ${p.apellidos}</td>
                        <td>${p.sociedad || '-'}</td>
                        <td>${p.clinica || '-'}</td>
                        <td style="font-weight: 600; text-align: right;">${importe > 0 ? importe.toFixed(2) + ' €' : '-'}</td>
                        <td style="text-align: center;">
                            <a href="Expediente_paciente.html?id=${p.id}" class="action-icon" title="Ver Expediente" style="font-size: 1.4rem;">📂</a>
                            <a href="evaluacion.html?id=${p.id}" class="action-icon" title="Evaluación" style="display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 42px; background: white; border-radius: 10px; border: 1px solid #ddd; margin-left: 10px; transition: all 0.3s ease;">
                                <img src="img/evaluación.png" alt="Eval" style="width: 26px; height: auto;">
                            </a>
                            <a href="psilogia.html?id=${p.id}" class="action-icon-ia" title="IA PsicoFact" style="display: inline-flex; align-items: center; justify-content: center; width: 42px; height: 42px; background: #f0f7ff; border-radius: 10px; border: 1px solid #3498db; margin-left: 10px; transition: all 0.3s ease; box-shadow: 0 2px 4px rgba(52, 152, 219, 0.1);">
                                <img src="img/Psia.png" alt="IA" style="width: 28px; height: auto;">
                            </a>
                        </td>
                    </tr>`;
            });
        }

        function clearFilters() {
            document.getElementById('form-busqueda').reset();
            lastFilteredList = [];
            renderResults([]);
            document.getElementById('resultados-busqueda').innerHTML = '<tr><td colspan="6" style="text-align: center; color: #95a5a6;">Use los filtros para buscar pacientes</td></tr>';
        }

        window.handleSearch = handleSearch;
        window.handleSort = handleSort;
        window.clearFilters = clearFilters;
        window.clearFilters = clearFilters;
    </script>

</body>
</html>
