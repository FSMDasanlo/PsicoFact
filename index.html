<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PsicoFact - Gestión Facultativa</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* ══════════════════════════════════════
           PREVENT FLASH DE INICIO
        ══════════════════════════════════════ */
        /* Oculta la página entera inicialmente para evitar el flash */
        body {
            visibility: hidden;
        }

        #auth-screen {
            display: none; 
        }

        /* ══════════════════════════════════════
           PANTALLA DE INICIO
        ══════════════════════════════════════ */
        #auth-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            /* Degradado y fallback de color para evitar el fondo blanco */
            background-color: #0A2B42;
            background-image: url('img/solo_psia.PNG'), linear-gradient(to right, #0A2B42, #0A394F);
            background-repeat: no-repeat;
            background-position: center bottom, center;
            background-size: contain, cover;
            display: flex; 
            flex-direction: column;
            overflow: hidden;
        }

        @media (max-width: 768px) {
            #auth-screen {
                background-position: center center;
                background-size: contain; 
            }
        }

        /* Eliminado ::before que podía causar confusión al inspeccionar y oscurecer el fondo */

        /* Vistas */
        .auth-view { display: none; }
        .auth-view.active { display: block; }

        /* ── Vista inicio: dos botones mínimos en la parte baja ── */
        #view-home {
            position: absolute;
            bottom: 2.8rem;
            left: 0;
            right: 0;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0.8rem;
        }
        #view-home.active { display: flex; }

        .view-home-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.2rem;
        }

        .btn-link {
            background: none;
            border: none;
            color: rgba(255,255,255,0.75); /* Aumentada la opacidad para mejor legibilidad */
            font-size: 0.78rem;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.2s;
        }
        .btn-link:hover { color: #fff; }

        .btn-entry {
            padding: 0.52rem 1.55rem;
            border-radius: 50px;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s, transform 0.12s, box-shadow 0.2s;
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
        }
        .btn-entry:active { transform: scale(0.96); }

        .btn-entry-primary {
            background: rgba(26, 188, 156, 0.28);
            border: 1px solid rgba(26, 188, 156, 0.70);
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .btn-entry-primary:hover {
            background: rgba(26, 188, 156, 0.48);
            box-shadow: 0 0 14px rgba(26, 188, 156, 0.30);
        }

        .btn-entry-ghost {
            background: rgba(255,255,255,0.10);
            border: 1px solid rgba(255,255,255,0.35);
            color: rgba(255,255,255,0.82);
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        .btn-entry-ghost:hover { background: rgba(255,255,255,0.20); }

        /* ── Panel de formulario (login / registro) ── */
        #view-login,
        #view-register {
            position: absolute;
            inset: 0;
            display: none;
        }
        #view-login.active,
        #view-register.active { display: block; }

        .auth-panel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% - 2rem);
            max-width: 330px;
            background: rgba(8, 22, 38, 0.84);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,0.13);
            border-radius: 18px;
            padding: 1.9rem 1.7rem;
            box-shadow: 0 18px 52px rgba(0,0,0,0.55);
            color: #fff;
        }

        .auth-view label {
            display: block;
            text-align: left;
            font-size: 0.74rem;
            font-weight: 600;
            color: rgba(255,255,255,0.68);
            margin-bottom: 0.28rem;
            margin-top: 1rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .auth-view input {
            width: 100%;
            padding: 0.70rem 0.9rem;
            border-radius: 9px;
            border: 1px solid rgba(255,255,255,0.22);
            background: rgba(255,255,255,0.10);
            color: #fff;
            font-size: 0.92rem;
            outline: none;
            transition: border 0.2s, background 0.2s;
            box-sizing: border-box;
        }
        .auth-view input::placeholder { color: rgba(255,255,255,0.35); }
        .auth-view input:focus {
            border-color: #1abc9c;
            background: rgba(255,255,255,0.17);
        }

        .btn-submit {
            margin-top: 1.5rem;
            width: 100%;
            padding: 0.84rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #1abc9c, #3498db);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: opacity 0.2s, transform 0.12s;
        }
        .btn-submit:hover   { opacity: 0.88; }
        .btn-submit:active  { transform: scale(0.97); }
        .btn-submit:disabled { opacity: 0.50; cursor: not-allowed; }

        .auth-msg {
            margin-top: 0.8rem;
            font-size: 0.79rem;
            min-height: 1.1em;
            text-align: center;
        }
        .auth-msg.error   { color: #ff6b6b; }
        .auth-msg.success { color: #1abc9c; }

        .btn-back {
            display: block;
            margin: 1rem auto 0;
            background: none;
            border: none;
            color: rgba(255,255,255,0.48);
            font-size: 0.78rem;
            cursor: pointer;
            text-decoration: underline;
            transition: color 0.2s;
        }
        .btn-back:hover { color: rgba(255,255,255,0.85); }

        /* ── App ── */
        #app-wrapper { display: none; }

        .btn-logout {
            background: rgba(255,255,255,0.14);
            border: 1px solid rgba(255,255,255,0.32);
            color: #fff;
            padding: 0.35rem 0.9rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.82rem;
            transition: background 0.2s;
        }
        .btn-logout:hover { background: rgba(255,255,255,0.26); }

        /* Estilo para el nombre del facultativo debajo del botón */
        .user-info-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }
        #user-name {
            color: rgba(255,255,255,0.85);
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <!-- ════════════════════════════════════════
         PANTALLA DE AUTENTICACIÓN
    ════════════════════════════════════════ -->
    <div id="auth-screen">

        <!-- ── VISTA 1: Inicio – botones mínimos en la parte baja ── -->
        <div id="view-home" class="auth-view active">
            <div class="view-home-buttons">
                <button class="btn-entry btn-entry-primary" id="go-login">Acceder</button>
                <button class="btn-entry btn-entry-ghost" id="go-register">Crear usuario</button>
            </div>
            <button class="btn-link" id="forgot-password">Olvidé la contraseña</button>
        </div>

        <!-- ── VISTA 2: Login ── -->
        <div id="view-login" class="auth-view">
            <div class="auth-panel">
                <label for="login-email">Correo electrónico</label>
                <input type="email" id="login-email" placeholder="usuario@correo.com" autocomplete="username" />

                <label for="login-password">Contraseña</label>
                <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />

                <button class="btn-submit" id="login-btn">Entrar</button>
                <button class="btn-link" id="forgot-password-login" style="margin-top: 0.8rem; display: block; margin-left: auto; margin-right: auto;">¿Olvidaste tu contraseña?</button>
                <p class="auth-msg error" id="login-error"></p>
                <button class="btn-back" id="back-from-login">← Volver</button>
            </div>
        </div>

        <!-- ── VISTA 3: Registro ── -->
        <div id="view-register" class="auth-view">
            <div class="auth-panel">
                <label for="reg-email">Correo electrónico</label>
                <input type="email" id="reg-email" placeholder="nuevo@correo.com" autocomplete="username" />

                <label for="reg-password">Contraseña</label>
                <input type="password" id="reg-password" placeholder="Mínimo 6 caracteres" autocomplete="new-password" />

                <label for="reg-password2">Confirmar contraseña</label>
                <input type="password" id="reg-password2" placeholder="Repite la contraseña" autocomplete="new-password" />

                <button class="btn-submit" id="register-btn">Crear cuenta</button>
                <p class="auth-msg" id="register-msg"></p>
                <button class="btn-back" id="back-from-register">← Volver</button>
            </div>
        </div>

    </div>

    <!-- ════════════════════════════════════════
         APLICACIÓN (visible tras autenticación)
    ════════════════════════════════════════ -->
    <div id="app-wrapper">
        <header class="navbar">
            <div class="logo-container">
                <span class="brand-name"><strong>P</strong>sico<strong>F</strong>act</span>
            </div>
            <div class="user-info-container">
                <button class="btn-logout" id="logout-btn">Cerrar sesión</button>
                <span id="user-name"></span>
            </div>
        </header>

        <main class="container">
            <nav class="main-menu">
                <a href="agenda.html" class="menu-card">
                    <div class="icon">📅</div>
                    <h2>Agenda</h2>
                    <p>Citas y horarios</p>
                </a>
                <a href="consultas.html" class="menu-card">
                    <div class="icon">👤</div>
                    <h2>Consultas</h2>
                    <p>Gestión de expedientes</p>
                </a>
                <a href="configuracion.html" class="menu-card">
                    <div class="icon">⚙️</div>
                    <h2>Configuración</h2>
                    <p>Datos maestros de la aplicación</p>
                </a>
                <a href="help.html" class="menu-card" style="border-bottom-color: var(--turquesa);">
                    <div class="icon">❓</div>
                    <h2>Ayuda</h2>
                    <p>Guía de uso y soporte</p>
                </a>
            </nav>
        </main>

        <footer>
            <p>&copy; 2026 PsicoFact - Gestión de Psicología</p>
        </footer>
    </div>

    <!-- Firebase SDK -->
    <script src="js/config.js"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
                 onAuthStateChanged, signOut, sendPasswordResetEmail }
            from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
        import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

        const firebaseConfig = window.APP_CONFIG.firebase;

        const app  = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db   = getFirestore(app);

        // -- Lógica para evitar flash inicial --
        const authScreen   = document.getElementById('auth-screen');
        const appWrapper   = document.getElementById('app-wrapper');
        
        const likelyLoggedIn = localStorage.getItem('firebase:authUser:' + firebaseConfig.apiKey + ':[DEFAULT]');
        if (!likelyLoggedIn) {
            authScreen.style.display = 'flex';
        }
        // Mostramos el body una vez decidida la visibilidad inicial de la pantalla de auth
        document.body.style.visibility = 'visible';

        // ── Elementos ──
        const viewHome     = document.getElementById('view-home');
        const viewLogin    = document.getElementById('view-login');
        const viewRegister = document.getElementById('view-register');

        const ERROR_MSGS = {
            'auth/invalid-credential':  'Credenciales incorrectas.',
            'auth/user-not-found':      'Usuario no encontrado.',
            'auth/wrong-password':      'Contraseña incorrecta.',
            'auth/too-many-requests':   'Demasiados intentos. Inténtalo más tarde.',
            'auth/invalid-email':       'Correo electrónico no válido.',
            'auth/email-already-in-use':'Este correo ya está registrado.',
            'auth/weak-password':       'La contraseña debe tener al menos 6 caracteres.',
        };

        // ── Navegación entre vistas ──
        function showView(view) {
            [viewHome, viewLogin, viewRegister].forEach(v => v.classList.remove('active'));
            view.classList.add('active');
            document.getElementById('login-error').textContent = '';
            document.getElementById('register-msg').textContent = '';
            document.getElementById('register-msg').className = 'auth-msg';
        }

        document.getElementById('go-login').addEventListener('click', () => showView(viewLogin));
        document.getElementById('go-register').addEventListener('click', () => showView(viewRegister));
        document.getElementById('back-from-login').addEventListener('click', () => showView(viewHome));
        document.getElementById('back-from-register').addEventListener('click', () => showView(viewHome));

        // ── Recuperar contraseña ──
        async function handleResetPassword() {
            const email = window.prompt('Introduce tu correo electrónico para recibir un enlace de recuperación:');
            if (!email) return;

            try {
                await sendPasswordResetEmail(auth, email);
                alert('Se ha enviado un correo de recuperación a: ' + email);
            } catch (err) {
                alert('Error al enviar el correo: ' + (ERROR_MSGS[err.code] || err.message));
            }
        }

        document.getElementById('forgot-password').addEventListener('click', handleResetPassword);
        document.getElementById('forgot-password-login').addEventListener('click', handleResetPassword);

        // ── Estado de autenticación ──
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                authScreen.style.display = 'none';
                appWrapper.style.display = 'block';
                // Cargar nombre del facultativo
                try {
                    const snap = await getDoc(doc(db, 'usuarios', user.uid, 'facultativo', 'perfil'));
                    const nameEl = document.getElementById('user-name');
                    if (nameEl && snap.exists()) {
                        const d = snap.data();
                        nameEl.textContent = [d.nombre, d.apellidos].filter(Boolean).join(' ');
                    }
                } catch(e) { console.error(e); }
            } else {
                authScreen.style.display = 'flex';
                appWrapper.style.display = 'none';
                document.getElementById('user-name').textContent = '';
                showView(viewHome);
            }
        });

        // ── Login ──
        const loginBtn = document.getElementById('login-btn');
        loginBtn.addEventListener('click', async () => {
            const email    = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const errorEl  = document.getElementById('login-error');
            errorEl.textContent = '';

            if (!email || !password) {
                errorEl.textContent = 'Introduce correo y contraseña.';
                return;
            }
            loginBtn.disabled = true;
            loginBtn.textContent = 'Autenticando…';
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) {
                errorEl.textContent = ERROR_MSGS[err.code] || 'Error al iniciar sesión.';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Entrar';
            }
        });

        document.getElementById('login-password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') loginBtn.click();
        });

        // ── Registro ──
        const registerBtn = document.getElementById('register-btn');
        registerBtn.addEventListener('click', async () => {
            const email   = document.getElementById('reg-email').value.trim();
            const pass1   = document.getElementById('reg-password').value;
            const pass2   = document.getElementById('reg-password2').value;
            const msgEl   = document.getElementById('register-msg');
            msgEl.textContent = '';
            msgEl.className   = 'auth-msg';

            if (!email || !pass1 || !pass2) {
                msgEl.className = 'auth-msg error';
                msgEl.textContent = 'Completa todos los campos.';
                return;
            }
            if (pass1 !== pass2) {
                msgEl.className = 'auth-msg error';
                msgEl.textContent = 'Las contraseñas no coinciden.';
                return;
            }
            registerBtn.disabled = true;
            registerBtn.textContent = 'Creando cuenta…';
            try {
                await createUserWithEmailAndPassword(auth, email, pass1);
                // onAuthStateChanged abre la app automáticamente al crearse la sesión
            } catch (err) {
                msgEl.className = 'auth-msg error';
                msgEl.textContent = ERROR_MSGS[err.code] || 'Error al crear el usuario.';
                registerBtn.disabled = false;
                registerBtn.textContent = 'Crear cuenta';
            }
        });

        // ── Logout ──
        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));


    </script>

</body>
</html>
