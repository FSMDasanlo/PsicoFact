<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facturas - PsicoFact</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <!-- Librería para generar PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none;">
                <span class="brand-name"><strong>P</strong>sico<strong>F</strong>act</span>
            </a>
        </div>
        <div class="header-date" id="current-date"></div>
    </header>

    <main class="container">
        <div class="agenda-header">
            <h2>Gestión de Facturas</h2>
            <div class="agenda-actions">
                <a href="index.html" class="home-icon" title="Inicio">🏠</a>
                <a href="consultas.html" class="back-link">&larr; Volver</a>
            </div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 20px; justify-content: center;">
            <button class="btn-turquesa" onclick="showSection('nueva')">Nueva Factura</button>
            <button class="btn-turquesa" onclick="showSection('consultar')">Consultar Facturas</button>
        </div>

        <!-- SECCIÓN NUEVA FACTURA -->
        <section id="sec-nueva" class="agenda-container">
            <h3 style="margin-bottom: 1rem;">Generar Nueva Factura</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Periodo</label>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <button class="btn-turquesa" style="font-size: 0.8rem;" onclick="setMonth(-1)">Mes Anterior</button>
                        <button class="btn-turquesa" style="font-size: 0.8rem;" onclick="setMonth(0)">Mes Actual</button>
                        <span id="display-periodo" style="margin-left: 10px; font-weight: 600; color: var(--azul-oscuro); font-size: 0.85rem;"></span>
                    </div>
                    <input type="hidden" id="mes-elegido">
                </div>
                <div class="form-group">
                    <label>Sociedad (Filtro)</label>
                    <select id="select-sociedad" required></select>
                </div>
                <div class="form-group">
                    <label>Clínica</label>
                    <select id="select-clinica" required></select>
                </div>
                <div class="form-actions" style="align-items: flex-end;">
                    <button class="btn-turquesa" onclick="generarPrevisualizacion()">Generar Factura</button>
                </div>
            </div>

            <div id="preview-container" class="hidden">
                <div id="invoice-to-print" class="invoice-box" style="margin-top: 30px;">
                    <table cellpadding="0" cellspacing="0">
                        <tr class="top">
                            <td colspan="2">
                                <table>
                                    <tr>
                                        <td>
                                            <strong>Felipe Poblet</strong><br>
                                            DNI: 1234567<br>
                                            Cuenta: ZZZZ-AAAA-OOOO
                                        </td>
                                        <td style="text-align: right;">
                                            Factura #: <span id="fac-num"></span><br>
                                            Fecha: <span id="fac-fecha"></span>
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>
                        <tr class="information">
                            <td colspan="2">
                                <table>
                                    <tr>
                                        <td>
                                            <strong>Cliente:</strong><br>
                                            <span id="fac-cliente"></span>
                                        </td>
                                    </tr>
                                </table>
                            </td>
                        </tr>
                        <tr class="heading">
                            <td>Sesión / Paciente</td>
                            <td style="text-align: right;">Importe</td>
                        </tr>
                        <tbody id="fac-items"></tbody>
                        <tr class="total">
                            <td></td>
                            <td>Subtotal: <span id="fac-subtotal"></span> €</td>
                        </tr>
                        <tr class="total">
                            <td></td>
                            <td>IVA (10%): <span id="fac-iva"></span> €</td>
                        </tr>
                        <tr class="total">
                            <td></td>
                            <td>Total: <span id="fac-total"></span> €</td>
                        </tr>
                    </table>
                </div>
                <div style="margin-top: 20px; text-align: center;">
                    <button class="btn-turquesa" onclick="guardarYDescargarPDF()">Guardar y Descargar PDF</button>
                </div>
            </div>
        </section>

        <!-- SECCIÓN CONSULTAR -->
        <section id="sec-consultar" class="agenda-container hidden">
            <h3 style="margin-bottom: 1rem;">Histórico de Facturas</h3>
            <table class="agenda-table">
                <thead>
                    <tr>
                        <th>Nº Factura</th>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Total</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-facturas"></tbody>
            </table>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, getDoc, doc, query, where, orderBy, limit, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUgTAvRE0IhFq3snlwPIwTkZn7eJU6Tyk",
            authDomain: "psicofact-404ba.firebaseapp.com",
            projectId: "psicofact-404ba",
            storageBucket: "psicofact-404ba.firebasestorage.app",
            messagingSenderId: "216824213435",
            appId: "1:216824213435:web:282a094dbf842db8719e9e",
            measurementId: "G-CNG232R6TW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let clinicsMaster = [];
        function showToast(message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => container.removeChild(toast), 300);
            }, 3500);
        }

        let currentInvoiceData = null;

        async function init() {
            const snapS = await getDocs(query(collection(db, "sociedades"), orderBy("nombre")));
            const snapC = await getDocs(query(collection(db, "clinicas"), orderBy("nombre")));
            const sSel = document.getElementById('select-sociedad');
            const cSel = document.getElementById('select-clinica');
            sSel.innerHTML = '<option value="">Todas las sociedades</option>';
            cSel.innerHTML = '<option value="">Seleccione...</option>';
            clinicsMaster = snapC.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            snapS.forEach(doc => sSel.innerHTML += `<option value="${doc.data().nombre}">${doc.data().nombre}</option>`);
            clinicsMaster.forEach(c => cSel.innerHTML += `<option value="${c.nombre}">${c.nombre}</option>`);
            setMonth(0);
        }

        window.setMonth = function(offset) {
            const d = new Date();
            const target = new Date(d.getFullYear(), d.getMonth() + offset, 1);
            const y = target.getFullYear();
            const m = String(target.getMonth() + 1).padStart(2, '0');
            const periodo = `${y}-${m}`;
            document.getElementById('mes-elegido').value = periodo;
            
            // Limpiar previsualización si existe al cambiar de mes
            document.getElementById('preview-container').classList.add('hidden');
            currentInvoiceData = null;

            const nombresMeses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            const display = document.getElementById('display-periodo');
            if(display) display.textContent = `${nombresMeses[target.getMonth()]} ${y}`;
        };

        window.showSection = async function(section) {
            document.getElementById('sec-nueva').classList.toggle('hidden', section !== 'nueva');
            document.getElementById('sec-consultar').classList.toggle('hidden', section !== 'consultar');
            if(section === 'consultar') loadInvoices();
        };

        async function loadInvoices() {
            const snap = await getDocs(query(collection(db, "facturas"), orderBy("numero", "desc")));
            const tbody = document.getElementById('lista-facturas');
            tbody.innerHTML = '';
            snap.forEach(d => {
                const f = d.data();
                tbody.innerHTML += `<tr>
                    <td>${f.numero}</td>
                    <td>${f.fecha}</td>
                    <td>${f.cliente}</td>
                    <td>${f.total.toFixed(2)} €</td>
                    <td style="text-align: center;">
                        <a href="javascript:void(0)" class="action-icon" onclick="reimprimirFactura('${d.id}')" title="Reimprimir PDF">🖨️</a>
                        <a href="javascript:void(0)" class="action-icon" onclick="eliminarFactura('${d.id}')" title="Eliminar Factura">🗑️</a>
                    </td>
                </tr>`;
            });
        }

        window.generarPrevisualizacion = async function() {
            try {
                const mes = document.getElementById('mes-elegido').value;
                const sociedad = document.getElementById('select-sociedad').value;
                const clinica = document.getElementById('select-clinica').value;

                const clinicData = clinicsMaster.find(c => c.nombre === clinica);
                if (!clinica) {
                    showToast("Seleccione una Clínica", "error");
                    return;
                }

                // Obtener citas del mes, sociedad y clinica (estado completed)
                // NOTA: Esta consulta requiere un índice compuesto en Firestore
                let constraints = [
                    where("clinica", "==", clinica), 
                    where("estado", "==", "completed")
                ];

                if (sociedad) {
                    constraints.push(where("sociedad", "==", sociedad));
                }
                
                const q = query(collection(db, "citas"), ...constraints);
                
                const snap = await getDocs(q);
                const citas = snap.docs.map(d => d.data()).filter(c => c.fecha && c.fecha.startsWith(mes));

                if (citas.length === 0) {
                    showToast("No hay sesiones finalizadas en el periodo elegido.", "error");
                    return;
                }

                // Correlativo Factura
                const facSnap = await getDocs(query(collection(db, "facturas"), orderBy("numero", "desc"), limit(1)));
                let nextNum = 1;
                if (!facSnap.empty) {
                    const lastNumStr = facSnap.docs[0].data().numero.split('-').pop();
                    nextNum = parseInt(lastNumStr) + 1;
                }
                const numFactura = `FP-2026-${String(nextNum).padStart(3, '0')}`;

                // Fecha factura (Ultimo dia del mes)
                const parts = mes.split('-');
                const lastDay = new Date(parts[0], parts[1], 0).toLocaleDateString('es-ES');

                // Cálculos
                const subtotal = citas.reduce((acc, c) => acc + (parseFloat(c.importe) || 0), 0);
                const iva = subtotal * 0.10;
                const total = subtotal + iva;

                // Render
                document.getElementById('fac-num').textContent = numFactura;
                document.getElementById('fac-fecha').textContent = lastDay;
                
                const infoCliente = `<strong>${clinicData.nombre}</strong><br>${clinicData.direccion || ''}<br>Att: ${clinicData.contacto || ''}`;
                document.getElementById('fac-cliente').innerHTML = infoCliente;

                const itemsTable = document.getElementById('fac-items');
                itemsTable.innerHTML = '';
                citas.sort((a,b) => a.fecha.localeCompare(b.fecha)).forEach(c => {
                    itemsTable.innerHTML += `<tr class="item"><td>${c.fecha} - ${c.paciente}</td><td style="text-align: right;">${parseFloat(c.importe).toFixed(2)} €</td></tr>`;
                });

                document.getElementById('fac-subtotal').textContent = subtotal.toFixed(2);
                document.getElementById('fac-iva').textContent = iva.toFixed(2);
                document.getElementById('fac-total').textContent = total.toFixed(2);

                currentInvoiceData = {
                    numero: numFactura,
                    fecha: lastDay,
                    cliente: infoCliente,
                    clinica: clinica,
                    subtotal: subtotal,
                    iva: iva,
                    total: total,
                    items: citas.map(c => ({ fecha: c.fecha, paciente: c.paciente, importe: c.importe }))
                };

                document.getElementById('preview-container').classList.remove('hidden');
                showToast("Previsualización generada", "success");
            } catch (error) {
                console.error(error);
                showToast("Error al consultar citas. Compruebe los índices.", "error");
            }
        };

        window.guardarYDescargarPDF = async function() {
            if(!currentInvoiceData) return;
            
            try {
                // Guardar en Firestore
                await addDoc(collection(db, "facturas"), currentInvoiceData);
                
                // Generar PDF
                const element = document.getElementById('invoice-to-print');
                const opt = {
                    margin: 1,
                    filename: `${currentInvoiceData.numero}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                };
                html2pdf().set(opt).from(element).save();
                
                showToast("Factura guardada y PDF generado.");
                document.getElementById('preview-container').classList.add('hidden');
                showSection('consultar');
            } catch (e) {
                console.error(e);
                showToast("Error al guardar la factura.", "error");
            }
        };

        window.reimprimirFactura = async function(id) {
            const docSnap = await getDoc(doc(db, "facturas", id));
            if (!docSnap.exists()) return;
            const f = docSnap.data();

            // Rellenar visualización de la factura con los datos guardados
            document.getElementById('fac-num').textContent = f.numero;
            document.getElementById('fac-fecha').textContent = f.fecha;
            document.getElementById('fac-cliente').innerHTML = f.cliente;
            const itemsTable = document.getElementById('fac-items');
            itemsTable.innerHTML = '';
            if (f.items) {
                f.items.sort((a,b) => a.fecha.localeCompare(b.fecha)).forEach(c => {
                    itemsTable.innerHTML += `<tr class="item"><td>${c.fecha} - ${c.paciente}</td><td style="text-align: right;">${parseFloat(c.importe).toFixed(2)} €</td></tr>`;
                });
            }
            document.getElementById('fac-subtotal').textContent = f.subtotal.toFixed(2);
            document.getElementById('fac-iva').textContent = f.iva.toFixed(2);
            document.getElementById('fac-total').textContent = f.total.toFixed(2);

            // Generar el PDF directamente
            const element = document.getElementById('invoice-to-print');
            const opt = {
                margin: 1,
                filename: `${f.numero}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        };

        window.eliminarFactura = async function(id) {
            if (confirm("¿Está seguro de que desea eliminar esta factura del historial? Esta acción no se puede deshacer.")) {
                try {
                    await deleteDoc(doc(db, "facturas", id));
                    showToast("Factura eliminada correctamente.");
                    loadInvoices(); // Recargar la lista
                } catch (e) {
                    console.error("Error al eliminar la factura: ", e);
                    showToast("Error al eliminar la factura.", "error");
                }
            }
        };

        // Fecha Navbar
        const dateElement = document.getElementById('current-date');
        dateElement.textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        init();
    </script>
</body>
</html>
