<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Facturas - PsicoFact</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none;">
                <span class="brand-name"><strong>P</strong>sico<strong>F</strong>act</span>
            </a>
        </div>
        <div class="header-date" id="current-date"></div>
    </header>

    <main class="container">
        <div class="agenda-container">
            <div class="agenda-header">
                <h2>Historico de facturas</h2>
                <div class="agenda-actions" style="display: flex; gap: 10px;">
                    <button class="btn-turquesa" onclick="openInvoiceModal()" style="border:none; cursor:pointer;">+ Nueva Factura</button>
                    <button class="btn-turquesa" onclick="exportToCSV()" style="border:none; cursor:pointer;">Exportar CSV</button>
                    <select id="filtro-ano" onchange="loadInvoices()" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-family: inherit;">
                        <option value="">Cualquier Año...</option>
                    </select>
                    <select id="filtro-cliente" onchange="loadInvoices()" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-family: inherit;">
                        <option value="">Todas las Clínicas...</option>
                    </select>
                    <a href="index.html" class="home-icon" title="Inicio">🏠</a>
                </div>
            </div>

            <table class="agenda-table">
                <thead>
                    <tr id="resumen-totales" style="background-color: #f8f9fa; border-bottom: 2px solid var(--azul-primario);">
                        <td colspan="3" style="text-align: right; font-weight: 600; color: var(--azul-oscuro);">TOTALES SELECCIÓN:</td>
                        <td id="total-base-sum" style="font-weight: bold; color: var(--azul-primario);">0.00 €</td>
                        <td id="total-iva-sum" style="font-weight: bold; color: var(--turquesa);">0.00 €</td>
                        <td id="total-final-sum" style="font-weight: bold; color: var(--azul-oscuro); background: #eee;">0.00 €</td>
                    </tr>
                    <tr>
                        <th>Fecha</th>
                        <th>Paciente</th>
                        <th>Clínica</th>
                        <th>Base Imp.</th>
                        <th>IVA (21%)</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="invoices-body"></tbody>
            </table>
        </div>
    </main>

    <!-- Modal para Nueva Factura -->
    <div id="modalFactura" class="modal">
        <div class="modal-content">
            <div class="agenda-header">
                <h2>Generar Nueva Factura</h2>
                <span class="close-modal" onclick="closeInvoiceModal()">&times;</span>
            </div>
            <form id="form-factura" class="form-grid">
                <div class="form-group">
                    <label for="fecha">Fecha</label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>
                <div class="form-group">
                    <label for="paciente-select">Paciente</label>
                    <select id="paciente-select" name="paciente" required onchange="handlePatientChange()">
                        <option value="">Seleccione un paciente...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="clinica-factura">Clínica</label>
                    <input type="text" id="clinica-factura" name="clinica" readonly style="background-color: #f0f0f0;">
                </div>
                <div class="form-group">
                    <label for="importe-factura">Importe (€)</label>
                    <input type="number" id="importe-factura" name="importe" step="0.01" required>
                </div>
                <div class="form-group full-width">
                    <label for="obs-factura">Observaciones / Concepto</label>
                    <textarea id="obs-factura" name="observaciones" rows="2"></textarea>
                </div>
                <input type="hidden" name="estado" value="completed">
                <input type="hidden" id="sociedad-factura" name="sociedad">
                
                <div class="form-actions full-width">
                    <button type="submit" class="btn-turquesa">Guardar y Contabilizar</button>
                    <button type="button" class="back-link" style="border:none; background:none; cursor:pointer;" onclick="closeInvoiceModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, orderBy, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUgTAvRE0IhFq3snlwPIwTkZn7eJU6Tyk",
            authDomain: "psicofact-404ba.firebaseapp.com",
            projectId: "psicofact-404ba",
            storageBucket: "psicofact-404ba.firebasestorage.app",
            messagingSenderId: "216824213435",
            appId: "1:216824213435:web:282a094dbf842db8719e9e",
            measurementId: "G-CNG232R6TW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let currentInvoices = [];
        let patientsMaster = [];
        let clinicsMasterData = [];

        async function init() {
            // Fecha actual en el navbar
            document.getElementById('current-date').textContent = new Date().toLocaleDateString('es-ES', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

            // Llenar selector de años 2026 - 2060
            const yearSelect = document.getElementById('filtro-ano');
            for (let y = 2026; y <= 2060; y++) {
                const opt = document.createElement('option');
                opt.value = y; opt.textContent = y;
                yearSelect.appendChild(opt);
            }

            // Llenar selector de clínicas (clientes)
            const snapClinics = await getDocs(query(collection(db, "clinicas"), orderBy("nombre")));
            clinicsMasterData = snapClinics.docs.map(d => d.data());
            const clientSelect = document.getElementById('filtro-cliente');
            clinicsMasterData.forEach(clinic => {
                const opt = document.createElement('option');
                opt.value = clinic.nombre; opt.textContent = clinic.nombre;
                clientSelect.appendChild(opt);
            });

            // Llenar pacientes para el modal
            const snapP = await getDocs(collection(db, "pacientes"));
            patientsMaster = snapP.docs.map(d => d.data());
            const pSelect = document.getElementById('paciente-select');
            patientsMaster.forEach(p => {
                const opt = document.createElement('option');
                opt.value = `${p.nombre} ${p.apellidos}`;
                opt.textContent = `${p.nombre} ${p.apellidos}`;
                pSelect.appendChild(opt);
            });

            loadInvoices();
        }

        function handlePatientChange() {
            const selectedName = document.getElementById('paciente-select').value;
            const patient = patientsMaster.find(p => (p.nombre + " " + p.apellidos) === selectedName);
            if (patient) {
                document.getElementById('clinica-factura').value = patient.clinica;
                document.getElementById('sociedad-factura').value = patient.sociedad || '';
                const clinicData = clinicsMasterData.find(c => c.nombre === patient.clinica);
                document.getElementById('importe-factura').value = clinicData ? parseFloat(clinicData.importe) : '';
            }
        }

        function openInvoiceModal() {
            document.getElementById('form-factura').reset();
            document.getElementById('fecha').value = new Date().toISOString().split('T')[0];
            document.getElementById('modalFactura').style.display = 'flex';
        }

        function closeInvoiceModal() {
            document.getElementById('modalFactura').style.display = 'none';
        }

        document.getElementById('form-factura').onsubmit = async function(e) {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            data.hora = new Date().toLocaleTimeString('es-ES', { hour12: false, hour: '2-digit', minute: '2-digit' });
            await addDoc(collection(db, "citas"), data);
            closeInvoiceModal();
            loadInvoices();
        };

        async function loadInvoices() {
            const selectedYear = document.getElementById('filtro-ano').value;
            const selectedClinic = document.getElementById('filtro-cliente').value;
            const tbody = document.getElementById('invoices-body');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Buscando facturas...</td></tr>';

            // Filtramos citas con estado 'completed' (Realizadas)
            let q = query(collection(db, "citas"), where("estado", "==", "completed"));
            if (selectedClinic) {
                q = query(collection(db, "citas"), where("estado", "==", "completed"), where("clinica", "==", selectedClinic));
            }

            const snap = await getDocs(q);
            let data = snap.docs.map(d => d.data());

            // Filtrado manual por año en JS
            if (selectedYear) {
                data = data.filter(c => c.fecha && c.fecha.startsWith(selectedYear));
            }

            // Ordenar por fecha descendente
            data.sort((a, b) => b.fecha.localeCompare(a.fecha));

            currentInvoices = data;
            renderTable(data);
        }

        function renderTable(items) {
            const tbody = document.getElementById('invoices-body');
            tbody.innerHTML = '';
            let sumBase = 0;

            items.forEach(item => {
                const base = parseFloat(item.importe) || 0;
                const iva = base * 0.21;
                const total = base + iva;
                sumBase += base;

                tbody.innerHTML += `
                    <tr>
                        <td>${item.fecha}</td>
                        <td>${item.paciente}</td>
                        <td>${item.clinica}</td>
                        <td>${base.toFixed(2)} €</td>
                        <td>${iva.toFixed(2)} €</td>
                        <td><strong>${total.toFixed(2)} €</strong></td>
                    </tr>`;
            });

            const sumIva = sumBase * 0.21;
            const sumTotal = sumBase + sumIva;
            document.getElementById('total-base-sum').textContent = sumBase.toFixed(2) + ' €';
            document.getElementById('total-iva-sum').textContent = sumIva.toFixed(2) + ' €';
            document.getElementById('total-final-sum').textContent = sumTotal.toFixed(2) + ' €';
        }

        function exportToCSV() {
            if (currentInvoices.length === 0) {
                alert("No hay datos para exportar");
                return;
            }
            
            let csv = "\uFEFF"; // BOM para soporte UTF-8 en Excel
            csv += "Fecha;Paciente;Clinica;Base Imponible;IVA (21%);Total\n";
            
            currentInvoices.forEach(item => {
                const base = parseFloat(item.importe) || 0;
                const iva = base * 0.21;
                const total = base + iva;
                // Usamos punto y coma como separador y coma para decimales (formato común en España para Excel)
                csv += `${item.fecha};${item.paciente};${item.clinica};${base.toFixed(2).replace('.', ',')};${iva.toFixed(2).replace('.', ',')};${total.toFixed(2).replace('.', ',')}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Facturas_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // Exponer la función al objeto window para que sea accesible desde el onchange del HTML
        window.loadInvoices = loadInvoices;
        window.exportToCSV = exportToCSV;
        window.openInvoiceModal = openInvoiceModal;
        window.closeInvoiceModal = closeInvoiceModal;
        window.handlePatientChange = handlePatientChange;

        init();
    </script>
</body>
</html>
