<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico de Facturas</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none; display: flex; align-items: center;">
                <img src="img/solo_psia_peque.PNG" alt="Logo" class="logo-img">
            </a>
        </div>
        <div class="user-info-container">
            <button class="btn-logout" id="logout-btn">Cerrar sesión</button>
            <span id="user-name"></span>
        </div>
    </header>

    <main class="container">
        <div class="agenda-container">
            <div class="agenda-header">
                <h2>Facturación Mensual</h2>
                <div class="agenda-actions" style="display: flex; gap: 10px;">
                    <button class="btn-turquesa" id="btn-emitir" onclick="emitGroupedInvoice()" style="border:none; cursor:pointer; background: var(--turquesa); display: none;">Emitir Factura de Selección</button>
                    <button class="btn-turquesa" id="btn-deshacer" onclick="undoExclusions()" style="border:none; cursor:pointer; background: #e67e22; display: none;">Deshacer Exclusiones</button>
                    <select id="filtro-referencia" onchange="loadInvoicesByRef()" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-family: inherit;">
                        <option value="">Ver Factura Existente...</option>
                    </select>
                    <select id="filtro-mes" onchange="loadInvoices()" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-family: inherit;">
                        <option value="">Cualquier Mes...</option>
                        <option value="01">Enero</option><option value="02">Febrero</option><option value="03">Marzo</option>
                        <option value="04">Abril</option><option value="05">Mayo</option><option value="06">Junio</option>
                        <option value="07">Julio</option><option value="08">Agosto</option><option value="09">Septiembre</option>
                        <option value="10">Octubre</option><option value="11">Noviembre</option><option value="12">Diciembre</option>
                    </select>
                    <select id="filtro-ano" onchange="loadInvoices()" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-family: inherit;">
                        <option value="">Cualquier Año...</option>
                    </select>
                    <select id="filtro-cliente" onchange="loadInvoices()" style="padding: 8px; border-radius: 6px; border: 1px solid #ddd; font-family: inherit;">
                        <option value="">Seleccione Clínica...</option>
                    </select>
                    <a href="index.html" class="home-icon" title="Inicio">🏠</a>
                </div>
            </div>

            <div style="display: flex; justify-content: flex-start; margin-bottom: 10px;">
                <button class="btn-turquesa" onclick="exportToCSV()" style="border:none; cursor:pointer;">Exportar CSV</button>
            </div>

            <table class="agenda-table">
                <thead>
                    <tr id="resumen-totales" style="background-color: #f8f9fa; border-bottom: 2px solid var(--azul-primario);">
                        <td colspan="4" style="text-align: right; font-weight: 600; color: var(--azul-oscuro);">TOTALES SELECCIÓN:</td>
                        <td id="total-base-sum" style="font-weight: bold; color: var(--azul-primario);">0.00 €</td>
                        <td id="total-fac-sum" colspan="2" style="font-weight: bold; color: var(--turquesa); text-align: center;">0.00 €</td>
                    </tr>
                    <tr>
                        <th onclick="window.sortTable('n_factura')" style="cursor:pointer;">Nº Factura ↕️</th>
                        <th onclick="window.sortTable('fecha')" style="cursor:pointer;">Fecha ↕️</th>
                        <th onclick="window.sortTable('paciente')" style="cursor:pointer;">Paciente ↕️</th>
                        <th onclick="window.sortTable('clinica')" style="cursor:pointer;">Clínica ↕️</th>
                        <th onclick="window.sortTable('importe')" style="cursor:pointer;">Importe Clín. ↕️</th>
                        <th onclick="window.sortTable('porcentaje_facultativo')" style="cursor:pointer;">% Fac. ↕️</th>
                        <th onclick="window.sortTable('importe_facultativo')" style="cursor:pointer;">Cobro Fac. ↕️</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="invoices-body"></tbody>
            </table>
        </div>
    </main>

    <!-- Input oculto para disparar el explorador de archivos -->
    <input type="file" id="file-explorer-input" style="display: none;" accept=".pdf">

    <script src="js/config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, getDoc, query, where, orderBy, addDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = window.APP_CONFIG.firebase;

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUid = null;
        const uCol = (name) => collection(db, "usuarios", currentUid, name);
        const uDoc = (name, id) => doc(db, "usuarios", currentUid, name, id);

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            currentUid = user.uid;

            // Cargar nombre del facultativo
            try {
                const snap = await getDoc(doc(db, 'usuarios', user.uid, 'facultativo', 'perfil'));
                const nameEl = document.getElementById('user-name');
                if (nameEl) {
                    if (snap.exists()) {
                        const d = snap.data();
                        const fullName = [d.nombre, d.apellidos].filter(Boolean).join(' ');
                        nameEl.textContent = fullName || user.email;
                    } else {
                        nameEl.textContent = user.email;
                    }
                }
            } catch(e) { 
                console.error("Error cargando perfil:", e);
                const nameEl = document.getElementById('user-name');
                if (nameEl) nameEl.textContent = user.email;
            }

            init();
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        let currentInvoices = [];
        let clinicsMasterData = [];
        let excludedIds = []; // Nueva lista para rastrear sesiones a desvincular
        let facultativoData = {};
        let currentSortField = 'fecha';
        let currentSortOrder = 'desc';

        window.sortTable = function(field) {
            if (currentSortField === field) {
                currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortField = field;
                currentSortOrder = 'asc';
            }
            renderTable(currentInvoices);
        };

        async function init() {
            // Cargar datos del facultativo
            const facSnap = await getDoc(doc(db, 'usuarios', currentUid, 'facultativo', 'perfil'));
            if (facSnap.exists()) facultativoData = facSnap.data();

            // Llenar selector de años 2026 - 2060
            const yearSelect = document.getElementById('filtro-ano');
            for (let y = 2026; y <= 2060; y++) {
                const opt = document.createElement('option');
                opt.value = y; opt.textContent = y;
                yearSelect.appendChild(opt);
            }

            // Llenar selector de clínicas (clientes)
            const snapClinics = await getDocs(query(uCol("clinicas"), orderBy("nombre")));
            clinicsMasterData = snapClinics.docs.map(d => d.data());
            const clientSelect = document.getElementById('filtro-cliente');
            clinicsMasterData.forEach(clinic => {
                const opt = document.createElement('option');
                opt.value = clinic.nombre; 
                opt.textContent = clinic.nombre;
                clientSelect.appendChild(opt);
            });

            // Llenar selector de referencias al inicio buscando en todas las citas completadas
            const qAll = query(uCol("citas"), where("estado", "==", "completed"));
            const snapAll = await getDocs(qAll);
            const refSelect = document.getElementById('filtro-referencia');
            const seen = new Set();
            const uniqueRefs = [];
            
            snapAll.forEach(d => {
                const data = d.data();
                if (data.n_factura && data.n_factura !== '---' && !seen.has(data.n_factura)) {
                    seen.add(data.n_factura);
                    uniqueRefs.push({ ref: data.n_factura, clinica: data.clinica });
                }
            });

            uniqueRefs.sort((a, b) => {
                const parseRef = (r) => {
                    const m = r.match(/FP-(\d+)\/(\d+)/);
                    return m ? { year: parseInt(m[1]), num: parseInt(m[2]) } : { year: 0, num: 0 };
                };
                const ra = parseRef(a.ref);
                const rb = parseRef(b.ref);
                if (ra.year !== rb.year) return rb.year - ra.year;
                return rb.num - ra.num;
            });

            refSelect.innerHTML = '<option value="">Ver Factura Existente...</option>';
            uniqueRefs.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.ref; 
                opt.textContent = `${item.ref} - ${item.clinica}`;
                refSelect.appendChild(opt);
            });

            loadInvoices();
        }

        async function loadInvoicesByRef() {
            const ref = document.getElementById('filtro-referencia').value;
            if (!ref) {
                loadInvoices();
                return;
            }

            const tbody = document.getElementById('invoices-body');
            excludedIds = []; // Limpiamos exclusiones al cargar una factura nueva
            tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">Cargando factura...</td></tr>';

            const q = query(uCol("citas"), where("n_factura", "==", ref));
            const snap = await getDocs(q);
            currentInvoices = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            
            // Desmarcar filtros temporales para evitar confusión
            document.getElementById('filtro-mes').value = "";
            document.getElementById('filtro-ano').value = "";
            
            renderTable(currentInvoices);
            document.getElementById('btn-emitir').style.display = 'block';
            document.getElementById('btn-emitir').textContent = 'Re-Imprimir Factura';
        }

        window.toggleExclusion = function(id) {
            const index = excludedIds.indexOf(id);
            if (index > -1) {
                excludedIds.splice(index, 1);
            } else {
                excludedIds.push(id);
            }
            renderTable(currentInvoices);
            document.getElementById('btn-deshacer').style.display = excludedIds.length > 0 ? 'block' : 'none';
        }

        window.undoExclusions = function() {
            excludedIds = [];
            renderTable(currentInvoices);
            document.getElementById('btn-deshacer').style.display = 'none';
        }

        async function emitGroupedInvoice() {
            // 1. De todas las sesiones visibles, separar las ya facturadas de las pendientes
            //    independientemente de si el usuario las ha excluido o no.
            const yaFacturadas = currentInvoices.filter(i => i.n_factura && i.n_factura !== '---');
            const pendientes    = currentInvoices.filter(i => !i.n_factura || i.n_factura === '---');

            // 2. De las PENDIENTES, aplicar las exclusiones manuales del usuario
            const pendientesSeleccionadas = pendientes.filter(i => !excludedIds.includes(i.id));

            // REGLA DE ORO: las sesiones que ya tienen factura NO SE TOCAN NUNCA en este flujo.

            const year = document.getElementById('filtro-ano').value || new Date().getFullYear();

            let printableInvoices = [];
            let newInvoiceRef = "";

            if (pendientesSeleccionadas.length === 0 && yaFacturadas.length > 0) {
                // CASO A: Solo hay sesiones ya facturadas visibles (re-impresión o cambio de ref.)
                const refsExistentes = [...new Set(yaFacturadas.map(i => i.n_factura))];
                const defaultRef = refsExistentes[0];
                const manualRef = prompt(
                    `Todas las sesiones visibles ya están facturadas (${refsExistentes.join(', ')}).\n` +
                    `Puede cambiar la referencia o pulsar Aceptar para mantenerla.\n\n` +
                    `⚠️ Solo se actualizarán las sesiones con la referencia "${defaultRef}".`,
                    defaultRef
                );
                if (manualRef === null) return;
                newInvoiceRef = manualRef.trim() || defaultRef;
                // Solo re-asignamos las sesiones de ESA referencia concreta, no otras
                printableInvoices = yaFacturadas.filter(i => i.n_factura === defaultRef);

            } else if (pendientesSeleccionadas.length > 0 && yaFacturadas.length > 0) {
                // CASO B: Hay pendientes Y ya facturadas → solo procesamos las pendientes
                const refsExistentes = [...new Set(yaFacturadas.map(i => i.n_factura))];
                const nextRef = await generateNextInvoiceRef(year);
                const manualRef = prompt(
                    `Hay ${yaFacturadas.length} sesión(es) ya facturadas (${refsExistentes.join(', ')}) que NO se modificarán.\n\n` +
                    `Se va a crear una factura nueva para las ${pendientesSeleccionadas.length} sesiones pendientes.\n` +
                    `Introduzca la referencia:`,
                    nextRef
                );
                if (manualRef === null) return;
                newInvoiceRef = manualRef.trim() || nextRef;
                printableInvoices = pendientesSeleccionadas;  // ← solo las pendientes

            } else {
                // CASO C: Solo hay pendientes (nada facturado aún)
                const nextRef = await generateNextInvoiceRef(year);
                const manualRef = prompt(`Introduzca la referencia para las ${pendientesSeleccionadas.length} sesiones nuevas:`, nextRef);
                if (manualRef === null) return;
                newInvoiceRef = manualRef.trim() || nextRef;
                printableInvoices = pendientesSeleccionadas;
            }

            if (printableInvoices.length === 0) {
                alert('No hay sesiones a procesar.');
                return;
            }

            // 3. ACTUALIZACIÓN EN BASE DE DATOS — solo las sesiones de printableInvoices
            for (const item of printableInvoices) {
                await updateDoc(uDoc("citas", item.id), { n_factura: newInvoiceRef });
            }
            // ⚠️ NO se toca ninguna otra sesión. Las ya facturadas que no estén en printableInvoices
            //    conservan su referencia original intacta.

            // 4. FINALIZACIÓN
            alert(`Factura ${newInvoiceRef} procesada y lista para imprimir.`);
            printGroupedInvoice(printableInvoices, newInvoiceRef);
            excludedIds = [];
            loadInvoices();
        }

        async function generateNextInvoiceRef(year) {
            const q = query(uCol("citas"), 
                where("n_factura", ">=", `FP-${year}/`),
                where("n_factura", "<=", `FP-${year}/\uf8ff`)
            );
            const snap = await getDocs(q);
            let maxNum = 0;
            snap.forEach(d => {
                const parts = d.data().n_factura.split('/');
                if (parts.length === 2) {
                    const num = parseInt(parts[1]);
                    if (!isNaN(num) && num > maxNum) maxNum = num;
                }
            });
            return `FP-${year}/${String(maxNum + 1).padStart(3, '0')}`;
        }

        async function loadInvoices() {
            const selectedYear = document.getElementById('filtro-ano').value;
            const selectedMonth = document.getElementById('filtro-mes').value;
            const selectedClinic = document.getElementById('filtro-cliente').value;
            const tbody = document.getElementById('invoices-body');
            const btnEmitir = document.getElementById('btn-emitir');
            const btnDeshacer = document.getElementById('btn-deshacer');
            const refSelect = document.getElementById('filtro-referencia');

            if (!selectedClinic) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">Seleccione una clínica para ver sesiones</td></tr>';
                btnEmitir.style.display = 'none';

                // Cargar todas las referencias globales si no hay clínica seleccionada
                const qGlobal = query(uCol("citas"), where("estado", "==", "completed"));
                const snapGlobal = await getDocs(qGlobal);
                
                const globalData = snapGlobal.docs.map(d => d.data());
                const uniqueRefs = [];
                const seen = new Set();

                globalData.forEach(i => {
                    const refNum = i.n_factura;
                    if (refNum && refNum !== '---' && !seen.has(refNum)) {
                        seen.add(refNum);
                        uniqueRefs.push({ ref: refNum, clinica: i.clinica });
                    }
                });
                
                // Ordenar por número de factura (asumiendo formato FP-YYYY/NNN)
                uniqueRefs.sort((a, b) => {
                    // Extraer los componentes para una ordenación numérica real
                    const parseRef = (r) => {
                        const m = r.match(/FP-(\d+)\/(\d+)/);
                        return m ? { year: parseInt(m[1]), num: parseInt(m[2]) } : { year: 0, num: 0 };
                    };
                    const ra = parseRef(a.ref);
                    const rb = parseRef(b.ref);
                    if (ra.year !== rb.year) return rb.year - ra.year;
                    return rb.num - ra.num;
                });
                
                refSelect.innerHTML = '<option value="">Ver Factura Existente...</option>';
                uniqueRefs.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.ref; 
                    opt.textContent = `${item.ref} - ${item.clinica}`;
                    refSelect.appendChild(opt);
                });
                refSelect.style.display = 'block';
                return;
            }

            excludedIds = []; // Limpiamos exclusiones al cambiar de filtros
            btnDeshacer.style.display = 'none';
            tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">Buscando facturas...</td></tr>';

            let q = query(uCol("citas"), 
                where("estado", "==", "completed"), 
                where("clinica", "==", selectedClinic)
            );
            
            const snap = await getDocs(q);
            let allClinicSessions = snap.docs.map(d => ({ id: d.id, ...d.data() }));

            // Rellenar el desplegable de referencias con TODAS las existentes de esta clínica con el nombre de la clínica
            const uniqueRefs = [];
            const seen = new Set();

            allClinicSessions.forEach(i => {
                if (i.n_factura && i.n_factura !== '---' && !seen.has(i.n_factura)) {
                    seen.add(i.n_factura);
                    uniqueRefs.push({ ref: i.n_factura, clinica: i.clinica });
                }
            });
            uniqueRefs.sort((a, b) => b.ref.localeCompare(a.ref));
            
            refSelect.innerHTML = '<option value="">Ver Factura Existente...</option>';
            uniqueRefs.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item.ref; 
                opt.textContent = `${item.ref} - ${item.clinica}`;
                refSelect.appendChild(opt);
            });
            refSelect.style.display = 'block';

            // Ahora filtramos por año/mes para la visualización en la tabla de edición/generación
            let tableData = [...allClinicSessions];
            if (selectedYear) {
                tableData = tableData.filter(c => c.fecha && c.fecha.startsWith(selectedYear));
            }
            if (selectedMonth) {
                tableData = tableData.filter(c => c.fecha && c.fecha.split('-')[1] === selectedMonth);
            }

            // Ordenar la tabla por fecha descendente
            tableData.sort((a, b) => b.fecha.localeCompare(a.fecha));

            currentInvoices = tableData;
            renderTable(tableData);
            
            if (tableData.length > 0) {
                btnEmitir.style.display = 'block';
                btnEmitir.textContent = tableData.some(i => i.n_factura) ? 'Actualizar Factura' : 'Emitir Factura de Selección';
            } else { btnEmitir.style.display = 'none'; }
        }

        function renderTable(items) {
            const tbody = document.getElementById('invoices-body');
            tbody.innerHTML = '';

            // Ordenar datos
            items.sort((a, b) => {
                let valA = a[currentSortField] || '';
                let valB = b[currentSortField] || '';

                if (currentSortField === 'fecha') {
                    valA = `${a.fecha}T${a.hora || '00:00'}`;
                    valB = `${b.fecha}T${b.hora || '00:00'}`;
                }

                if (typeof valA === 'string') {
                    return currentSortOrder === 'asc' 
                        ? valA.localeCompare(valB, undefined, {numeric: true, sensitivity: 'base'}) 
                        : valB.localeCompare(valA, undefined, {numeric: true, sensitivity: 'base'});
                } else {
                    return currentSortOrder === 'asc' ? valA - valB : valB - valA;
                }
            });

            let sumBase = 0;
            let sumFacultativo = 0;

            items.forEach(item => {
                const isExcluded = excludedIds.includes(item.id);
                const importeClinica = parseFloat(item.importe) || 0;
                // Si no tiene importe_facultativo grabado, calculamos uno por defecto del 100% para no perder datos antiguos
                const importeFacultativo = item.importe_facultativo !== undefined ? parseFloat(item.importe_facultativo) : importeClinica;
                
                if (!isExcluded) {
                    sumBase += importeClinica;
                    sumFacultativo += importeFacultativo;
                }

                const rowStyle = isExcluded ? 'style="text-decoration: line-through; color: #999; opacity: 0.6; background-color: #fff1f1;"' : '';
                const displayPct = item.por_seguro ? 50 : (item.porcentaje_facultativo || 0);

                tbody.innerHTML += `
                    <tr ${rowStyle}>
                        <td style="font-weight: 600; color: var(--azul-oscuro);">${item.n_factura || '---'}</td>
                        <td>${item.fecha}</td>
                        <td>${item.referenciaPaciente || item.paciente}</td>
                        <td>${item.clinica}</td>
                        <td>${importeClinica.toFixed(2)} €</td>
                        <td style="color: #666; font-size: 0.85rem;">${displayPct}%</td>
                        <td style="color: var(--turquesa); font-weight: 600;">${importeFacultativo.toFixed(2)} €</td>
                        <td style="text-align: center;">
                            ${item.n_factura ? `<a href="javascript:void(0)" class="action-icon" onclick="triggerFilePicker()" title="Buscar PDF en el equipo" style="margin-right:8px;">📁</a>` : ''}
                            <a href="javascript:void(0)" class="action-icon" onclick="toggleExclusion('${item.id}')" title="${isExcluded ? 'Restaurar' : 'Excluir'}">${isExcluded ? '🔄' : '🗑️'}</a>
                        </td>
                    </tr>`;
            });

            document.getElementById('total-base-sum').textContent = sumBase.toFixed(2) + ' €';
            document.getElementById('total-fac-sum').textContent = sumFacultativo.toFixed(2) + ' €';
        }

        function exportToCSV() {
            const printableInvoices = currentInvoices.filter(i => !excludedIds.includes(i.id));
            if (printableInvoices.length === 0) {
                alert("No hay sesiones válidas para exportar");
                return;
            }
            
            let csv = "\uFEFF"; // BOM para soporte UTF-8 en Excel
            csv += "Nº Factura;Fecha;Paciente;Clinica;Importe Clinica;Imp. Facultativo;Total Facultativo\n";
            
            printableInvoices.forEach(item => {
                const totalClinica = parseFloat(item.importe) || 0;
                const totalFacultativo = item.importe_facultativo !== undefined ? parseFloat(item.importe_facultativo) : totalClinica;
                
                csv += `${item.n_factura || ''};${item.fecha};${item.referenciaPaciente || item.paciente};${item.clinica};${totalClinica.toFixed(2).replace('.', ',')};${totalFacultativo.toFixed(2).replace('.', ',')};${totalFacultativo.toFixed(2).replace('.', ',')}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `Facturas_${new Date().toISOString().split('T')[0]}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.triggerFilePicker = function() {
            document.getElementById('file-explorer-input').click();
        }

        window.printGroupedInvoice = function(invoicesToPrint, invoiceRef) {
            const printableInvoices = invoicesToPrint || currentInvoices.filter(i => !excludedIds.includes(i.id));
            if (printableInvoices.length === 0) return;

            const first = printableInvoices[0];
            const clinic = clinicsMasterData.find(c => c.nombre === first.clinica) || { nombre: first.clinica };
            const nFactura = invoiceRef || first.n_factura || 'PROFORMA';
            const today = new Date().toLocaleDateString('es-ES');

            // Mes de la factura (del primer registro)
            const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                                 'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
            let mesFactura = '';
            const firstFecha = (printableInvoices[0].fecha || '');
            if (firstFecha) {
                const fp = firstFecha.split('-');
                if (fp.length >= 2) mesFactura = monthNames[parseInt(fp[1], 10) - 1] + ' ' + fp[0];
            }

            // Totales (ICA = 0 %)
            let totalBase = 0;
            printableInvoices.forEach(item => { 
                const importeClinica = parseFloat(item.importe) || 0;
                const importeFacultativo = item.importe_facultativo !== undefined ? parseFloat(item.importe_facultativo) : importeClinica;
                totalBase += importeFacultativo; 
            });
            const irpf    = totalBase * 0.07;
            const liquido = totalBase - irpf;

            // Datos del facultativo
            const fac         = facultativoData;
            const facNombre   = [fac.nombre, fac.apellidos].filter(Boolean).join(' ') || '';
            const facNif      = fac.nif || '';
            const facDir      = fac.direccion || '';
            const facTelf     = fac.telefono || '';
            const textoFac    = fac.texto_factura || '';
            const textoExen   = fac.texto_exencion || '';
            const cuentaIBAN  = fac.cuenta_bancaria || '';
            const numColegiado = fac.num_colegiado || '';

            // Datos de la clínica
            const clinNombre = clinic.nombre || '';
            const clinNif    = clinic.cif || '';
            const clinDir    = clinic.direccion || '';
            const clinTelf   = clinic.telefono || '';

            const printWindow = window.open('', '', 'height=900,width=950');
            printWindow.document.write(`<!DOCTYPE html><html lang="es"><head>
<meta charset="UTF-8">
<title>Factura ${nFactura}<\/title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Segoe UI",Arial,sans-serif;font-size:13px;color:#222;background:#fff}
  .page{max-width:800px;margin:40px auto;padding:40px}
  .titulo{text-align:center;letter-spacing:10px;font-size:1.9rem;font-weight:700;color:#2c3e50;margin-bottom:52px}
  hr.azul{border:none;border-top:2px solid #3498db;margin:10px 0}
  hr.gris{border:none;border-top:1px solid #ccc;margin:18px 0}
  .ref{display:flex;justify-content:space-between;align-items:center;margin:14px 0 10px;font-size:13px}
  .partes{display:flex;justify-content:space-between;gap:30px;margin:18px 0}
  .partes .col{flex:1;line-height:1.8}
  .partes .col.derecha{text-align:right}
  .partes .col strong{display:block;font-size:14px;color:#2c3e50;margin-bottom:2px}
  .concepto{margin:24px 0;font-size:13px;line-height:1.8}
  table.totales{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
  table.totales td{padding:8px 10px;border-bottom:1px solid #e0e0e0}
  table.totales td:last-child{text-align:right;min-width:130px}
  table.totales tr.liquido td{font-weight:700;font-size:14px;border-top:2px solid #3498db;border-bottom:2px solid #3498db}
  .pie{margin-top:28px;padding-top:14px;border-top:1px solid #ccc;font-size:12px;color:#444;line-height:2}
  .pie p{margin:2px 0}
  .firma{margin-top:70px;font-size:13px;line-height:2}
  @page{margin:0;size:A4}  @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact;margin:1.5cm 2cm}.page{margin:0;padding:0}}
<\/style><\/head><body>
<div class="page">

  <p class="titulo">F A C T U R A<\/p>
  <hr class="azul">

  <div class="ref">
    <span><strong>Factura: ${nFactura}</strong></span>
    <span>${today}<\/span>
  <\/div>

  <hr class="azul">

  <div class="partes">
    <div class="col">
      <strong>${facNombre}<\/strong>
      <p>NIF: ${facNif}<\/p>
      <p>${facDir}<\/p>
      <p>Telf.: ${facTelf}<\/p>
    <\/div>
    <div class="col derecha">
      <strong>${clinNombre}<\/strong>
      <p>NIF/CIF: ${clinNif}<\/p>
      <p>${clinDir}<\/p>
      <p>Telf.: ${clinTelf}<\/p>
    <\/div>
  <\/div>

  <hr class="gris">

  <div class="concepto">    <br><br><br><br>    <p>${textoFac}${mesFactura ? ' ' + mesFactura : ''}<\/p>
  <\/div>

  <table class="totales">
    <tr>
      <td>Base imponible<\/td>
      <td>${totalBase.toFixed(2)} €<\/td>
    <\/tr>
    <tr>
      <td>Retención I.R.P.F. (7%)<\/td>
      <td>${irpf.toFixed(2)} €<\/td>
    <\/tr>
    <tr class="liquido">
      <td>Líquido<\/td>
      <td>${liquido.toFixed(2)} €<\/td>
    <\/tr>
  <\/table>

  <hr class="gris">

  <div class="pie">
    ${textoExen ? `<p>${textoExen}<\/p><br>` : ''}
    ${cuentaIBAN ? `<p><strong>Cuenta Bancaria:<\/strong> ${cuentaIBAN}<\/p>` : ''}
  <\/div>

  <div class="firma">
    <br><br><br>
    <p>Fdo: ${facNombre}<\/p>
    <p>N. de Colegiado: ${numColegiado}<\/p>
  <\/div>

<\/div>
<\/body><\/html>`);
            printWindow.document.close();
            setTimeout(() => { printWindow.print(); }, 600);
        }

        // Exponer la función al objeto window para que sea accesible desde el onchange del HTML
        window.loadInvoices = loadInvoices;
        window.exportToCSV = exportToCSV;
        window.emitGroupedInvoice = emitGroupedInvoice;
        window.printGroupedInvoice = printGroupedInvoice;
        window.loadInvoicesByRef = loadInvoicesByRef;
        window.toggleExclusion = toggleExclusion;
        window.undoExclusions = undoExclusions;
        window.triggerFilePicker = triggerFilePicker;

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            currentUid = user.uid;
            init();
        });

        // Hacer funciones accesibles globalmente
        window.loadInvoices = loadInvoices;
        window.loadInvoicesByRef = loadInvoicesByRef;
        window.emitGroupedInvoice = emitGroupedInvoice;
        window.exportToCSV = exportToCSV;
    </script>
</body>
</html>
