<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas - PsicoFact</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none;">
                <span class="brand-name"><strong>P</strong>sico<strong>F</strong>act</span>
            </a>
        </div>
        <div class="header-date" id="current-date"></div>
    </header>

    <main class="container">
        <div class="agenda-header" style="text-align: left;">
            <h2>Consultas</h2>
            <a href="index.html" class="back-link">&larr; Volver</a>
        </div>

        <nav class="main-menu">
            <a href="Con_pacientes.html" class="menu-card">
                <div class="icon">👥</div>
                <h2>Pacientes</h2>
                <p>Listado y expedientes</p>
            </a>
            <a href="Con_citas.html" class="menu-card">

            </a>
            <a href="facturas.html" class="menu-card">
                <div class="icon">💰</div>
                <h2>Facturas</h2>
                <p>Gestión de cobros</p>
            </a>
        </nav>
    </main>

    <footer>
        <p>&copy; 2026 PsicoFact - Gestión de Psicología</p>
    </footer>

    <script>
        const dateElement = document.getElementById('current-date');
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const today = new Date();
        dateElement.textContent = today.toLocaleDateString('es-ES', options);
    </script>

</body>
</html>
