<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultas - PsicoFact</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none; display: flex; align-items: center;">
                <img src="img/solo_psia_peque.PNG" alt="PsicoFact Logo" class="logo-img">
                <span class="brand-name"><strong>P</strong>sico<strong>F</strong>act</span>
            </a>
        </div>
        <div class="user-info-container">
            <button class="btn-logout" id="logout-btn">Cerrar sesión</button>
            <span id="user-name"></span>
        </div>
    </header>

    <main class="container">
        <div class="agenda-header" style="text-align: left;">
            <h2>Consultas</h2>
            <a href="index.html" class="back-link">&larr; Volver</a>
        </div>

        <nav class="main-menu">
            <a href="Con_pacientes.html" class="menu-card">
                <div class="icon">👥</div>
                <h2>Pacientes</h2>
                <p>Listado y expedientes</p>
            </a>
            <a href="Con_citas.html" class="menu-card">
                <div class="icon">📅</div>
                <h2>Citas</h2>
                <p>Histórico y próximas visitas</p>
            </a>
            <a href="facturas.html" class="menu-card">
                <div class="icon">💰</div>
                <h2>Facturas</h2>
                <p>Gestión de cobros</p>
            </a>
        </nav>
    </main>

    <footer>
        <p>&copy; 2026 PsicoFact - Gestión de Psicología</p>
    </footer>

    <script src="js/config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = window.APP_CONFIG.firebase;
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            
            // Cargar nombre del facultativo
            try {
                const snap = await getDoc(doc(db, 'usuarios', user.uid, 'facultativo', 'perfil'));
                const nameEl = document.getElementById('user-name');
                if (nameEl) {
                    if (snap.exists()) {
                        const d = snap.data();
                        const fullName = [d.nombre, d.apellidos].filter(Boolean).join(' ');
                        nameEl.textContent = fullName || user.email;
                    } else {
                        nameEl.textContent = user.email;
                    }
                }
            } catch(e) { 
                console.error("Error cargando perfil:", e);
                const nameEl = document.getElementById('user-name');
                if (nameEl) nameEl.textContent = user.email;
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
    </script>

</body>
</html>
