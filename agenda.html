<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda - PsicoFact</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
    <style>
        .calendar-month {
            flex: 1;
            min-width: 300px;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .calendar-month h3 {
            text-align: center;
            margin-bottom: 15px;
            color: var(--azul-oscuro);
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }
        .calendar-day-header {
            font-weight: 600;
            font-size: 0.75rem;
            color: #7f8c8d;
            text-align: center;
            padding: 5px 0;
        }
        .calendar-day {
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9rem;
            border-radius: 50%;
            cursor: pointer;
        }
        .calendar-day.has-appointment {
            background-color: transparent; /* Se controla dinámicamente */
            color: inherit;
            font-weight: 600;
            cursor: pointer;
        }
        .calendar-day.empty { cursor: default; }
        .calendar-day.past {
            background-color: #f0f0f0;
            color: #a0a0a0;
            cursor: default;
        }
        .calendar-day.past.has-appointment {
            background-color: #f1c40f; /* Amarillo para sesiones pasadas */
            color: white;
            cursor: help;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none; display: flex; align-items: center;">
                <img src="img/solo_psia_peque.PNG" alt="PsicoFact Logo" class="logo-img">
                <span class="brand-name"><strong>P</strong>sico<strong>F</strong>act</span>
            </a>
        </div>
        <div class="user-info-container">
            <button class="btn-logout" id="logout-btn">Cerrar sesión</button>
            <span id="user-name"></span>
        </div>
    </header>

    <main class="container">
        <div class="agenda-container">
            <div class="agenda-header">
                <h2><span id="agenda-title-text">Citas de Hoy</span> <a href="javascript:void(0)" onclick="showCalendarView(true)" title="Vista de calendario" style="text-decoration:none; margin-left:10px;">📅</a></h2>
                <div class="agenda-actions">
                    <button class="btn-turquesa" style="border:none; cursor:pointer;" onclick="openAppointmentModal()">Nueva Cita</button>
                    <a href="index.html" class="home-icon" title="Inicio">🏠</a>
                    <a href="index.html" class="back-link">&larr; Volver</a>
                </div>
            </div>
            
            <!-- Filtros de búsqueda -->
            <div class="filters-section" style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; align-items: flex-end;">
                <div class="form-group" style="flex: 1; min-width: 200px; margin-bottom: 0;">
                    <label for="filtro-paciente" style="font-size: 0.85rem; font-weight: 600; color: var(--azul-oscuro);">Filtrar por Paciente</label>
                    <select id="filtro-paciente" onchange="loadFilteredAppointments()" style="width: 100%;">
                        <option value="">Cualquier paciente...</option>
                    </select>
                </div>
                <div class="form-group" style="flex: 1; min-width: 150px; margin-bottom: 0;">
                    <label for="filtro-estado" style="font-size: 0.85rem; font-weight: 600; color: var(--azul-oscuro);">Estado</label>
                    <select id="filtro-estado" onchange="loadFilteredAppointments()" style="width: 100%;">
                        <option value="">Cualquier estado</option>
                        <option value="pending">Pendiente</option>
                        <option value="completed">Realizada</option>
                    </select>
                </div>
            </div>

            <table class="agenda-table">
                <thead>
                    <tr>
                        <th onclick="window.sortTable('fecha')" style="cursor:pointer;">Hora ↕️</th>
                        <th onclick="window.sortTable('paciente')" style="cursor:pointer;">Paciente (Sociedad) ↕️</th>
                        <th onclick="window.sortTable('clinica')" style="cursor:pointer;">Clínica / Obs. ↕️</th>
                        <th onclick="window.sortTable('importe_facultativo')" style="cursor:pointer;">Imp. Fac. ↕️</th>
                        <th onclick="window.sortTable('estado')" style="cursor:pointer;">Estado ↕️</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="agenda-body"></tbody>
            </table>
        </div>
    </main>

    <!-- Modal para Vista Mensual -->
    <div id="modalCalendario" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="agenda-header">
                <h2>Vista Mensual de Sesiones</h2>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button class="btn-turquesa" onclick="changeCalendarMonth(-1)" style="padding: 5px 10px; cursor: pointer;">&larr;</button>
                    <button class="btn-turquesa" onclick="changeCalendarMonth(1)" style="padding: 5px 10px; cursor: pointer;">&rarr;</button>
                    <span class="close-modal" onclick="closeCalendarModal()" style="margin-left: 10px;">&times;</span>
                </div>
            </div>
            <div id="calendar-container" style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 20px;">
                <!-- Meses se cargarán aquí -->
            </div>
            <div class="form-actions full-width" style="justify-content: flex-end; margin-top: 20px;">
                <button type="button" class="btn-turquesa" onclick="closeCalendarModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Modal para Nueva Cita -->
    <div id="modalCita" class="modal">
        <div class="modal-content">
            <div class="agenda-header">
                <h2>Nueva Cita</h2>
                <span class="close-modal" onclick="closeAppointmentModal()">&times;</span>
            </div>
            <form id="form-cita" class="form-grid">
                <div class="form-group">
                    <label for="fecha">Fecha</label>
                    <input type="date" id="fecha" name="fecha" required>
                </div>
                <div class="form-group">
                    <label for="hora">Hora</label>
                    <input type="time" id="hora" name="hora" required>
                </div>
                <div class="form-group full-width">
                    <label for="paciente-select">Paciente</label>
                    <select id="paciente-select" name="paciente" required onchange="handlePatientChange()">
                        <option value="">Seleccione un paciente...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="sociedad-cita">Sociedad</label>
                    <input type="text" id="sociedad-cita" name="sociedad" readonly style="background-color: #f0f0f0;">
                </div>
                <div class="form-group">
                    <label for="clinica-cita">Clínica</label>
                    <input type="text" id="clinica-cita" name="clinica" readonly style="background-color: #f0f0f0;">
                </div>
                <div class="form-group full-width" style="display: flex; flex-direction: row; gap: 15px; align-items: flex-end; width: 100%;">
                    <div style="flex: 2;">
                        <label for="importe-cita" style="white-space: nowrap; font-size: 0.95rem; font-weight: 700;">Sesión (€)</label>
                        <input type="number" id="importe-cita" name="importe" step="0.01" oninput="calculateFacultativoAmount()" style="width: 100%; padding: 12px; text-align: right; font-size: 1rem; border: 2px solid #ccc;">
                    </div>
                    <div style="flex: 2;">
                        <label for="importe-facultativo" style="white-space: nowrap; font-size: 0.95rem; font-weight: 700;">Facultativo (€)</label>
                        <input type="number" id="importe-facultativo" name="importe_facultativo" step="0.01" readonly style="background-color: #f0f0f0; width: 100%; padding: 12px; text-align: right; font-size: 1rem; border: 2px solid #ccc;">
                    </div>
                    <div style="flex: 1.5; display: flex; align-items: center; gap: 8px; padding-bottom: 12px; background: #e0f2f1; padding: 10px; border-radius: 6px; border: 1px solid var(--turquesa); justify-content: center;">
                        <input type="checkbox" id="por-seguro" name="por_seguro" onchange="calculateFacultativoAmount()" style="width: 20px; height: 20px; cursor: pointer; margin: 0;">
                        <label for="por-seguro" style="margin: 0; cursor: pointer; font-size: 0.9rem; font-weight: 800; white-space: nowrap; color: var(--azul-oscuro);">POR SEGURO</label>
                    </div>
                </div>
                <input type="hidden" id="porcentaje-facultativo-cita" name="porcentaje_facultativo">
                <div class="form-group full-width">
                    <label for="obs-cita">Observaciones</label>
                    <textarea id="obs-cita" name="observaciones" rows="3"></textarea>
                </div>
                <div class="form-group full-width">
                    <label for="estado-cita">Estado de la Cita</label>
                    <select id="estado-cita" name="estado">
                        <option value="pending">Pendiente</option>
                        <option value="completed">Realizada</option>
                        <option value="cancelled">Cancelada</option>
                    </select>
                </div>
                
                <!-- Sección para clonar/repetir cita -->
                <div class="form-group full-width" style="background-color: #f1f8ff; padding: 15px; border-radius: 8px; border: 1px solid #cce5ff; margin-top: 10px;">
                    <label style="font-weight: 700; color: #004085; display: flex; align-items: center; gap: 10px; cursor: pointer; margin-bottom: 0;">
                        <input type="checkbox" id="repetir-cita" style="width: 20px; height: 20px; cursor: pointer;">
                        Repetir esta cita semanalmente
                    </label>
                    <div id="repeticion-opciones" style="display: none; margin-top: 12px; align-items: center; gap: 10px; padding-left: 30px; font-weight: 600; color: #004085;">
                        <span>Crear</span>
                        <input type="number" id="repeticion-veces" value="1" min="1" max="12" style="width: 65px; padding: 8px; border: 1px solid #b8daff; border-radius: 4px; text-align: center;">
                        <span>citas adicionales (una cada semana)</span>
                    </div>
                </div>

                <input type="hidden" id="ref-cita" name="referenciaPaciente">
                <div class="form-actions full-width">
                    <button type="submit" class="btn-turquesa">Guardar Cita</button>
                    <button type="button" class="btn-turquesa" style="background: var(--turquesa);" onclick="addToGoogleCalendar()">Añadir a Google Calendar</button>
                    <button type="button" class="back-link" style="border:none; background:none; cursor:pointer;" onclick="closeAppointmentModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal para Agenda en tramos de 15 min -->
    <div id="modalAgendaTramos" class="modal">
        <div class="modal-content" style="max-width: 95%; width: 1000px; height: 85vh; padding: 20px; display: flex; flex-direction: column;">
            <div class="agenda-header" style="margin-bottom: 20px;">
                <h2 style="margin: 0;">Agenda Detallada (15 min)</h2>
                <span class="close-modal" onclick="closeTramosModal()">&times;</span>
            </div>
            <div id="tramos-container" style="overflow: auto; flex: 1; border: 1px solid #dee2e6; border-radius: 8px;">
                <!-- Tabla de tramos se cargará aquí -->
            </div>
            <div class="form-actions" style="margin-top: 20px; justify-content: flex-end;">
                <button type="button" class="btn-turquesa" onclick="closeTramosModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = window.APP_CONFIG.firebase;

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUid = null;
        const uCol = (name) => collection(db, "usuarios", currentUid, name);
        const uDoc = (name, id) => doc(db, "usuarios", currentUid, name, id);

        function showToast(message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => container.removeChild(toast), 300);
            }, 3500);
        }

        let patientsMaster = [];
        let clinicsMasterData = [];
        let statesMasterData = [];
        let appointments = [];
        let currentCalendarDate = new Date();
        let editingAppointmentId = null;
        let wasCalendarOpen = false; // Flag para saber si venimos del calendario
        let currentSortField = 'fecha';
        let currentSortOrder = 'asc';

        async function init() {
            const snapP = await getDocs(uCol("pacientes"));
            patientsMaster = snapP.docs.map(d => d.data());
            const snapC = await getDocs(uCol("clinicas"));
            clinicsMasterData = snapC.docs.map(d => d.data());
            
            // Cargar estados
            try {
                const snapE = await getDocs(uCol("estados_cita"));
                statesMasterData = snapE.docs.map(d => d.data());
                if (statesMasterData.length === 0) {
                    statesMasterData = [
                        { clave: 'pending', nombre: 'Pendiente' },
                        { clave: 'completed', nombre: 'Realizada' },
                        { clave: 'cancelled', nombre: 'Cancelada' }
                    ];
                }
            } catch (e) {
                console.error("Error cargando estados:", e);
            }

            populatePatientDropdown();
            populateStatesDropdowns();
            loadFilteredAppointments();
        }

        function populateStatesDropdowns() {
            const filterSelect = document.getElementById('filtro-estado');
            const formSelect = document.getElementById('estado-cita');
            
            if (filterSelect && formSelect) {
                let optionsHtml = statesMasterData.map(s => `<option value="${s.clave}">${s.nombre}</option>`).join('');
                filterSelect.innerHTML = '<option value="">Cualquier estado</option>' + optionsHtml;
                formSelect.innerHTML = optionsHtml;
            }
        }

        function populatePatientDropdown() {
            const select = document.getElementById('paciente-select');
            const filterSelect = document.getElementById('filtro-paciente');
            let optionsHtml = '';
            patientsMaster.forEach(p => {
                optionsHtml += `<option value="${p.nombre} ${p.apellidos}">${p.nombre} ${p.apellidos}</option>`;
            });
            select.innerHTML = '<option value="">Seleccione un paciente...</option>' + optionsHtml;
            filterSelect.innerHTML = '<option value="">Cualquier paciente...</option>' + optionsHtml;
        }

        window.formatDate = function(dateStr) {
            if (!dateStr) return '';
            const [year, month, day] = dateStr.split('-');
            return `${day}-${month}-${year}`;
        };

        window.calculateFacultativoAmount = function() {
            const total = parseFloat(document.getElementById('importe-cita').value) || 0;
            const isSeguro = document.getElementById('por-seguro').checked;
            let pct;
            if (isSeguro) {
                pct = 50;
            } else {
                pct = parseFloat(document.getElementById('porcentaje-facultativo-cita').value) || 0;
            }
            const facAmount = (total * pct) / 100;
            document.getElementById('importe-facultativo').value = facAmount.toFixed(2);
        };

        function handlePatientChange() {
            const selectedName = document.getElementById('paciente-select').value;
            document.getElementById('por-seguro').checked = false;
            const patient = patientsMaster.find(p => (p.nombre + " " + p.apellidos) === selectedName);
            if (patient) {
                document.getElementById('sociedad-cita').value = patient.sociedad;
                document.getElementById('clinica-cita').value = patient.clinica;
                
                const clinicData = clinicsMasterData.find(c => c.nombre === patient.clinica);
                const pct = clinicData ? (parseFloat(clinicData.porcentaje_facultativo) || 0) : 0;
                
                // Prioridad: Importe definido en el paciente, si no, el de la clínica
                const importePaciente = parseFloat(patient.importe_sesion);
                const importeTotal = (!isNaN(importePaciente)) ? importePaciente : (clinicData ? parseFloat(clinicData.importe) : 0);
                
                document.getElementById('importe-cita').value = importeTotal > 0 ? importeTotal : '';
                document.getElementById('porcentaje-facultativo-cita').value = pct;
                document.getElementById('ref-cita').value = patient.referencia || '';
                
                window.calculateFacultativoAmount();
            } else {
                document.getElementById('sociedad-cita').value = '';
                document.getElementById('clinica-cita').value = '';
                document.getElementById('importe-cita').value = '';
                document.getElementById('porcentaje-facultativo-cita').value = '0';
                document.getElementById('importe-facultativo').value = '';
                document.getElementById('ref-cita').value = '';
                document.getElementById('por-seguro').checked = false;
            }
        }

        function getStatusLabel(estado) {
            const state = statesMasterData.find(s => s.clave === estado);
            if (state) return state.nombre;
            
            const labels = {
                'confirmada': 'Confirmada',
                'pending': 'Pendiente',
                'completed': 'Realizada',
                'cancelled': 'Cancelada'
            };
            return labels[estado] || 'Pendiente';
        }

        async function loadFilteredAppointments() {
            const paciente = document.getElementById('filtro-paciente').value;
            const estado = document.getElementById('filtro-estado').value;
            const titleEl = document.getElementById('agenda-title-text');
            
            let q;
            if (!paciente && !estado) {
                const hoy = new Date().toISOString().split('T')[0];
                q = query(uCol("citas"), where("fecha", "==", hoy));
                if (titleEl) titleEl.textContent = "Citas de Hoy";
            } else {
                let constraints = [];
                if (paciente) constraints.push(where("paciente", "==", paciente));
                if (estado) constraints.push(where("estado", "==", estado));
                q = query(uCol("citas"), ...constraints);
                if (titleEl) titleEl.textContent = "Resultados de Búsqueda";
            }
            
            const snap = await getDocs(q);
            appointments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderAgenda();
        }

        window.sortTable = function(field) {
            if (currentSortField === field) {
                currentSortOrder = currentSortOrder === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortField = field;
                currentSortOrder = 'asc';
            }
            renderAgenda();
        };

        function renderAgenda() {
            const tbody = document.getElementById('agenda-body');
            tbody.innerHTML = '';
            
            // Ordenar dinámicamente
            appointments.sort((a, b) => {
                let valA = a[currentSortField] || '';
                let valB = b[currentSortField] || '';

                if (currentSortField === 'fecha') {
                    valA = `${a.fecha}T${a.hora}`;
                    valB = `${b.fecha}T${b.hora}`;
                }

                if (typeof valA === 'string') {
                    return currentSortOrder === 'asc' 
                        ? valA.localeCompare(valB, undefined, {numeric: true, sensitivity: 'base'}) 
                        : valB.localeCompare(valA, undefined, {numeric: true, sensitivity: 'base'});
                } else {
                    return currentSortOrder === 'asc' ? valA - valB : valB - valA;
                }
            });

            const isFiltering = document.getElementById('filtro-paciente').value || document.getElementById('filtro-estado').value;

            appointments.forEach(app => {
                const clinicInfo = clinicsMasterData.find(c => c.nombre === app.clinica);
                const clinicColor = clinicInfo ? clinicInfo.color : '#3498db';
                
                const isCompleted = app.estado === 'completed';
                const isCancelled = app.estado === 'cancelled';
                const checkIcon = isCompleted ? '✅' : (isCancelled ? '❌' : '⚪');
                
                const row = document.createElement('tr');
                if (isCompleted) row.classList.add('row-completed');
                if (isCancelled) row.classList.add('row-cancelled');
                
                const timeInfo = isFiltering ? `${window.formatDate(app.fecha)}<br><strong>${app.hora}</strong>` : app.hora;

                row.innerHTML = `
                    <td>${timeInfo}</td>
                    <td>${app.paciente} <br><small style="color: #666">(${app.sociedad})</small></td>
                    <td><span class="clinic-color-dot" style="background-color: ${clinicColor}"></span>${app.clinica} <br><small style="color: #999">${app.observaciones || app.obs || ''}</small></td>
                    <td><strong>${parseFloat(app.importe_facultativo || 0).toFixed(2)}€</strong> <br> <small style="color:#999">(${app.porcentaje_facultativo || 0}%)</small></td>
                    <td><span class="status-pill ${app.estado}">${getStatusLabel(app.estado)}</span></td>
                    <td style="text-align: center;">
                        <a href="javascript:void(0)" class="action-icon" onclick="completeAppointment('${app.id}')" title="${isCompleted ? 'Marcar como Pendiente' : 'Marcar como Realizada'}">${checkIcon}</a>
                        <a href="javascript:void(0)" class="action-icon" onclick="editAppointment('${app.id}')" title="Editar">✏️</a>
                        <a href="javascript:void(0)" class="action-icon" onclick="deleteAppointment('${app.id}')" title="Eliminar">🗑️</a>
                    </td>`;
                tbody.appendChild(row);
            });
        }

        function openAppointmentModal(title = "Nueva Cita", preselectedDate = null, preselectedTime = null) {
            const modal = document.getElementById('modalCita');
            modal.querySelector('h2').textContent = title;
            
            // Ajuste 3: Si el calendario está visible (en fondo), marcamos que volvemos a él
            if (document.getElementById('modalCalendario').style.display === 'flex') {
                wasCalendarOpen = true;
            }

            // Reset de repetición
            document.getElementById('repetir-cita').checked = false;
            document.getElementById('repeticion-opciones').style.display = 'none';
            document.getElementById('repeticion-veces').value = 1;

            if (title === "Nueva Cita") {
                document.getElementById('form-cita').reset();
                document.getElementById('fecha').value = preselectedDate || new Date().toISOString().split('T')[0];
                if (preselectedTime) document.getElementById('hora').value = preselectedTime;
                
                // Forzamos el estado a 'pending' al crear una nueva cita
                const estadoCita = document.getElementById('estado-cita');
                if (estadoCita) estadoCita.value = 'pending';
                
                editingAppointmentId = null;
            }
            modal.style.display = 'flex';
        }

        // Listener para el checkbox de repetición
        document.getElementById('repetir-cita').onchange = function() {
            document.getElementById('repeticion-opciones').style.display = this.checked ? 'flex' : 'none';
        };

        function closeAppointmentModal() { 
            document.getElementById('modalCita').style.display = 'none'; 
            if (wasCalendarOpen) {
                showCalendarView();
                wasCalendarOpen = false;
            }
        }
        
        async function completeAppointment(id) {
            const app = appointments.find(a => a.id === id);
            if (!app) return;
            const nuevoEstado = app.estado === 'completed' ? 'pending' : 'completed';
            await updateDoc(uDoc("citas", id), { estado: nuevoEstado });
            loadFilteredAppointments();
        }
        async function deleteAppointment(id) {
            if (confirm('¿Está seguro de que desea eliminar esta cita?')) {
                await deleteDoc(uDoc("citas", id));
                loadFilteredAppointments();
            }
        }
        function editAppointment(id) {
            const app = appointments.find(a => a.id === id);
            editingAppointmentId = id;
            
            // Primero abrimos el modal (esto hace el reset de campos de repetición y sets flags)
            openAppointmentModal("Editar Cita");

            ['fecha', 'hora', 'sociedad', 'clinica', 'importe', 'importe_facultativo', 'porcentaje_facultativo', 'observaciones', 'estado'].forEach(f => {
                const el = document.getElementById(f === 'observaciones' ? 'obs-cita' : (f === 'sociedad' ? 'sociedad-cita' : (f === 'clinica' ? 'clinica-cita' : (f === 'importe' ? 'importe-cita' : (f === 'importe_facultativo' ? 'importe-facultativo' : (f === 'porcentaje_facultativo' ? 'porcentaje-facultativo-cita' : (f === 'estado' ? 'estado-cita' : f)))))));
                if(el) {
                    el.value = app[f] || (f === 'estado' ? 'pending' : '');
                }
            });
            document.getElementById('paciente-select').value = app.paciente;
            document.getElementById('ref-cita').value = app.referenciaPaciente || '';
            document.getElementById('por-seguro').checked = !!app.por_seguro;
            
            // Si es una cita antigua y no tiene porcentaje grabado, buscamos el de su clínica actual
            if (!app.porcentaje_facultativo) {
                const clinicData = clinicsMasterData.find(c => c.nombre === app.clinica);
                if (clinicData) {
                    document.getElementById('porcentaje-facultativo-cita').value = clinicData.porcentaje_facultativo || 0;
                    window.calculateFacultativoAmount();
                }
            }
        }
        document.getElementById('form-cita').onsubmit = async function(e) {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            data.por_seguro = document.getElementById('por-seguro').checked;

            // Validación de conflicto (30 minutos)
            const nuevaFechaHora = new Date(`${data.fecha}T${data.hora}`);
            const conflicto = appointments.find(app => {
                if (app.id === editingAppointmentId) return false;
                if (app.fecha !== data.fecha) return false;
                const appFechaHora = new Date(`${app.fecha}T${app.hora}`);
                const diferenciaMs = Math.abs(nuevaFechaHora - appFechaHora);
                return diferenciaMs < (30 * 60 * 1000); // 30 minutos en ms
            });

            if (conflicto) {
                showToast(`Conflicto: Cita existente a las ${conflicto.hora} con ${conflicto.paciente}.`, 'error');
                return;
            }

            // Ajuste 2: Evitar estado "Pendiente" en citas pasadas
            const hoyStr = new Date().toISOString().split('T')[0];
            if (editingAppointmentId) {
                // Si editamos y es pasada
                if (data.fecha < hoyStr && data.estado === 'pending') {
                    showToast("No se puede poner una cita pasada como Pendiente. Se marcará como Cancelada.", "warning");
                    data.estado = 'cancelled';
                }
                await updateDoc(uDoc("citas", editingAppointmentId), data);
            } else {
                // Si es nueva y es pasada
                if (data.fecha < hoyStr && data.estado === 'pending') {
                    showToast("No se puede poner una cita pasada como Pendiente. Se marcará como Cancelada.", "warning");
                    data.estado = 'cancelled';
                } else if (!data.estado) {
                    data.estado = 'pending';
                }
                await addDoc(uCol("citas"), data);
            }
            
            // Lógica de Repetición (Clonado Semanal)
            const repetir = document.getElementById('repetir-cita').checked;
            const veces = parseInt(document.getElementById('repeticion-veces').value) || 0;
            
            if (repetir && veces > 0) {
                let creadas = 0;
                const baseDate = new Date(`${data.fecha}T${data.hora}`);
                
                for (let i = 1; i <= veces; i++) {
                    const nextDate = new Date(baseDate);
                    nextDate.setDate(baseDate.getDate() + (i * 7));
                    const nextDateStr = nextDate.toISOString().split('T')[0];
                    
                    // Clonamos los datos con la nueva fecha
                    const nextData = { ...data, fecha: nextDateStr, estado: 'pending' };
                    
                    // Ajuste 2 también para clones: Si la fecha clonada sigue siendo pasada
                    if (nextDateStr < hoyStr) {
                        nextData.estado = 'cancelled';
                    }
                    
                    // Si habia un ID de edición, lo quitamos para que sea una nueva inserción
                    delete nextData.id; 

                    await addDoc(uCol("citas"), nextData);
                    creadas++;
                }
                if (creadas > 0) {
                    showToast(`Se han creado ${creadas} citas semanales adicionales.`, 'success');
                }
            }

            loadFilteredAppointments(); 
            closeAppointmentModal();

            // Ajuste 3: Volver al calendario si estaba abierto y actualizarlo
            if (wasCalendarOpen) {
                showCalendarView();
                wasCalendarOpen = false;
            }
        };

        function addToGoogleCalendar() {
            const fecha = document.getElementById('fecha').value;
            const hora = document.getElementById('hora').value;
            const paciente = document.getElementById('paciente-select').value;
            const clinica = document.getElementById('clinica-cita').value;
            const obs = document.getElementById('obs-cita').value;

            if (!fecha || !hora || !paciente) {
                showToast("Rellene al menos Fecha, Hora y Paciente para añadir al calendario.", "error");
                return;
            }

            // Parse date and time
            const startDateTime = new Date(`${fecha}T${hora}`);
            // Assuming a standard 60-minute appointment duration
            const endDateTime = new Date(startDateTime.getTime() + (60 * 60 * 1000)); 

            // Format for Google Calendar (YYYYMMDDTHHMMSS)
            const formatDateTime = (date) => {
                const year = date.getFullYear();
                const month = String(date.getMonth() + 1).padStart(2, '0');
                const day = String(date.getDate()).padStart(2, '0');
                const hours = String(date.getHours()).padStart(2, '0');
                const minutes = String(date.getMinutes()).padStart(2, '0');
                const seconds = String(date.getSeconds()).padStart(2, '0');
                return `${year}${month}${day}T${hours}${minutes}${seconds}`;
            };

            const formattedStart = formatDateTime(startDateTime);
            const formattedEnd = formatDateTime(endDateTime);

            const title = `${paciente} - Cita PsicoFact`;
            const details = `Observaciones: ${obs || 'N/A'}\nClínica: ${clinica || 'N/A'}`;
            const location = clinica || '';

            const googleCalendarUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(title)}&dates=${formattedStart}/${formattedEnd}&details=${encodeURIComponent(details)}&location=${encodeURIComponent(location)}&sf=true&output=xml`;

            window.open(googleCalendarUrl, '_blank');
        }

        async function showCalendarView(reset = false) {
            if (reset) currentCalendarDate = new Date();
            
            const container = document.getElementById('calendar-container');
            container.innerHTML = 'Cargando calendario...';
            document.getElementById('modalCalendario').style.display = 'flex';

            // Establecemos el primer día del mes de la fecha actual de navegación
            const baseDate = new Date(currentCalendarDate.getFullYear(), currentCalendarDate.getMonth(), 1);
            const currentYear = baseDate.getFullYear();
            const currentMonth = baseDate.getMonth();
            
            const nextMonthDate = new Date(currentYear, currentMonth + 1, 1);
            const nextYear = nextMonthDate.getFullYear();
            const nextMonth = nextMonthDate.getMonth();

            // Query range: Del día 1 de este mes al último del siguiente
            const startStr = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-01`;
            const lastDayNext = new Date(nextYear, nextMonth + 1, 0).getDate();
            const endStr = `${nextYear}-${String(nextMonth + 1).padStart(2, '0')}-${String(lastDayNext).padStart(2, '0')}`;

            const q = query(uCol("citas"), where("fecha", ">=", startStr), where("fecha", "<=", endStr));
            const snap = await getDocs(q);
            const citasCalendar = snap.docs.map(d => d.data());

            container.innerHTML = '';
            container.appendChild(renderMonth(currentYear, currentMonth, citasCalendar));
            container.appendChild(renderMonth(nextYear, nextMonth, citasCalendar));
        }
        
        window.changeCalendarMonth = function(offset) {
            currentCalendarDate.setMonth(currentCalendarDate.getMonth() + offset);
            showCalendarView();
        }

        function renderMonth(year, month, allCitas) {
            const monthNames = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
            const dayNames = ["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"];
            
            const monthDiv = document.createElement('div');
            monthDiv.className = 'calendar-month';
            
            const title = document.createElement('h3');
            title.textContent = `${monthNames[month]} ${year}`;
            monthDiv.appendChild(title);
            
            const grid = document.createElement('div');
            grid.className = 'calendar-grid';
            
            // Cabeceras de días
            dayNames.forEach(d => {
                const h = document.createElement('div');
                h.className = 'calendar-day-header';
                h.textContent = d;
                grid.appendChild(h);
            });
            
            const firstDay = new Date(year, month, 1).getDay(); // 0 (Dom) a 6 (Sáb)
            const adjustedFirstDay = firstDay === 0 ? 6 : firstDay - 1; // Ajustar para que Lun sea 0
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Celdas vacías al inicio
            for (let i = 0; i < adjustedFirstDay; i++) {
                const empty = document.createElement('div');
                empty.className = 'calendar-day empty';
                grid.appendChild(empty);
            }
            
            // Celdas de días
            for (let day = 1; day <= daysInMonth; day++) {
                const dayEl = document.createElement('div');
                dayEl.className = 'calendar-day';
                dayEl.textContent = day;
                
                const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const today = new Date();
                today.setHours(0, 0, 0, 0); // Normalizar 'hoy' a inicio del día
                const currentDayDate = new Date(year, month, day);

                let clickTimer = null;
                dayEl.onclick = () => {
                    if (clickTimer) {
                        clearTimeout(clickTimer);
                        clickTimer = null;
                        return;
                    }
                    clickTimer = setTimeout(() => {
                        if (currentDayDate >= today) {
                            wasCalendarOpen = true; // Marcamos antes de cerrar
                            closeCalendarModal();
                            openAppointmentModal("Nueva Cita", dateKey);
                        }
                        clickTimer = null;
                    }, 250);
                };

                dayEl.ondblclick = (e) => {
                    if (clickTimer) {
                        clearTimeout(clickTimer);
                        clickTimer = null;
                    }
                    openTramosModal(dateKey);
                };

                if (currentDayDate < today) {
                    dayEl.classList.add('past'); // Añadir clase para días pasados
                }

                const dayCitas = allCitas.filter(c => c.fecha === dateKey);
                
                if (dayCitas.length > 0) {
                    dayEl.classList.add('has-appointment');
                    
                    // Lógica de colores y marcas según estado
                    const hasPending = dayCitas.some(c => c.estado === 'pending');
                    const allCompleted = dayCitas.every(c => c.estado === 'completed');
                    const allCancelled = dayCitas.every(c => c.estado === 'cancelled');

                    let content = `<span>${day}</span>`;
                    
                    if (allCompleted) {
                        dayEl.style.backgroundColor = '#d1ecf1'; // Azul pastel (Realizadas)
                        dayEl.style.color = '#0c5460';
                        content += `<span style="position: absolute; bottom: 2px; font-size: 0.6rem;">✅</span>`;
                    } else if (allCancelled) {
                        dayEl.style.backgroundColor = '#f8d7da'; // Rojo pastel (Canceladas)
                        dayEl.style.color = '#721c24';
                        content += `<span style="position: absolute; bottom: 2px; font-size: 0.6rem;">❌</span>`;
                    } else if (hasPending) {
                        dayEl.style.backgroundColor = '#fff3cd'; // Amarillo pastel (Pendientes)
                        dayEl.style.color = '#856404';
                    }

                    dayEl.innerHTML = content;
                    dayEl.style.position = 'relative';

                    const tooltip = dayCitas.map(c => `${c.paciente} (${c.hora}) - ${getStatusLabel(c.estado)}`).join('\n');
                    dayEl.title = tooltip;
                }
                
                grid.appendChild(dayEl);
            }
            
            monthDiv.appendChild(grid);
            return monthDiv;
        }

        function closeCalendarModal() { document.getElementById('modalCalendario').style.display = 'none'; }

        async function openTramosModal(selectedDateStr) {
            const container = document.getElementById('tramos-container');
            container.innerHTML = 'Cargando...';
            document.getElementById('modalAgendaTramos').style.display = 'flex';

            const selectedDate = new Date(selectedDateStr + 'T00:00:00');
            const dates = [];
            for (let i = -2; i <= 2; i++) {
                const d = new Date(selectedDate);
                d.setDate(d.getDate() + i);
                dates.push(d.toISOString().split('T')[0]);
            }

            // Fetch appointments for these dates
            const q = query(uCol("citas"), where("fecha", ">=", dates[0]), where("fecha", "<=", dates[4]));
            const snap = await getDocs(q);
            const citasRange = snap.docs.map(d => ({ id: d.id, ...d.data() }));

            // Asegurar que las citas del rango estén disponibles para editAppointment
            citasRange.forEach(c => {
                const index = appointments.findIndex(a => a.id === c.id);
                if (index === -1) {
                    appointments.push(c);
                } else {
                    // Actualizar por si ha cambiado el estado
                    appointments[index] = c;
                }
            });

            let html = `<table class="tramos-table" style="width: 100%; border-collapse: collapse; font-size: 0.85rem; background: white;">
                <thead>
                    <tr>
                        <th style="border: 1px solid #dee2e6; padding: 12px 8px; background: #f8f9fa; position: sticky; left: 0; z-index: 2;">Hora</th>`;
            
            dates.forEach((d, idx) => {
                const dateObj = new Date(d + 'T00:00:00');
                const dayName = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"][dateObj.getDay()];
                const isSelected = d === selectedDateStr;
                const bgColor = isSelected ? 'var(--azul-oscuro)' : '#f8f9fa';
                const textColor = isSelected ? 'white' : 'var(--azul-oscuro)';
                html += `<th style="border: 1px solid #dee2e6; padding: 12px 8px; background: ${bgColor}; color: ${textColor}; min-width: 140px; text-align: center;">
                            <div style="font-weight: 600;">${dayName}</div>
                            <div style="font-size: 0.75rem;">${dateObj.getDate()}/${dateObj.getMonth() + 1}/${dateObj.getFullYear()}</div>
                         </th>`;
            });

            html += `</tr></thead><tbody>`;

            for (let hour = 8; hour <= 21; hour++) {
                const timeStr = `${String(hour).padStart(2, '0')}:00`;
                html += `<tr>
                    <td style="border: 1px solid #dee2e6; padding: 10px 5px; text-align: center; font-weight: 600; background: #f8f9fa; position: sticky; left: 0; z-index: 1;">${timeStr}</td>`;
                
                dates.forEach(d => {
                    // Buscamos si hay alguna cita en esta hora (ej. 08:00, 08:30, etc.)
                    const citasEnHora = citasRange.filter(c => c.fecha === d && c.hora.startsWith(String(hour).padStart(2, '0') + ':'));
                    
                    if (citasEnHora.length > 0) {
                        html += `<td style="border: 1px solid #dee2e6; padding: 6px; background: #fff; cursor: pointer; text-align: center;" 
                                     ondragover="window.handleDragOver(event)" ondragleave="window.handleDragLeave(event)" ondrop="window.handleDrop(event, '${d}', '${timeStr}')">`;
                        citasEnHora.forEach(cita => {
                            const clinicInfo = clinicsMasterData.find(c => c.nombre === cita.clinica);
                            const clinicColor = clinicInfo ? clinicInfo.color : '#e3f2fd';
                            // Usar el color de la clínica con opacidad para el fondo
                            const bgColor = clinicInfo ? `${clinicInfo.color}22` : '#e3f2fd'; // 22 es ~13% opacidad
                            const borderColor = clinicInfo ? clinicInfo.color : '#bbdefb';

                            html += `<div style="font-weight: 600; margin-bottom: 4px; border: 1px solid ${borderColor}; background: ${bgColor}; padding: 4px; border-radius: 4px; color: #333;" 
                                        draggable="true" ondragstart="window.handleDragStart(event, '${cita.id}')" ondragend="window.handleDragEnd(event)"
                                        onclick="wasCalendarOpen=true; window.closeTramosModal(); window.closeCalendarModal(); setTimeout(() => window.editAppointment('${cita.id}'), 50)">
                                        <div style="font-size: 0.8rem;">${cita.hora}</div>
                                        <div>${cita.paciente}</div>
                                        <div style="font-size: 0.7rem; color: #666; font-weight: 400;">${cita.clinica}</div>
                                     </div>`;
                        });
                        html += `</td>`;
                    } else {
                        html += `<td style="border: 1px solid #dee2e6; padding: 6px; cursor: pointer; color: #dee2e6; text-align: center; transition: background 0.2s;" 
                                    ondragover="window.handleDragOver(event)" ondragleave="window.handleDragLeave(event)" ondrop="window.handleDrop(event, '${d}', '${timeStr}')"
                                    onmouseover="this.style.background='#f1f3f5'; this.textContent='+'" 
                                    onmouseout="this.style.background='transparent'; this.textContent=''"
                                    onclick="wasCalendarOpen=true; window.closeTramosModal(); window.closeCalendarModal(); setTimeout(() => window.openAppointmentModal('Nueva Cita', '${d}', '${timeStr}'), 50)"></td>`;
                    }
                });
                html += `</tr>`;
            }

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function closeTramosModal() { document.getElementById('modalAgendaTramos').style.display = 'none'; }

        // Exponer funciones al objeto window para acceso desde el HTML
        window.openAppointmentModal = openAppointmentModal;
        window.closeAppointmentModal = closeAppointmentModal;
        window.handlePatientChange = handlePatientChange;
        window.completeAppointment = completeAppointment;
        window.editAppointment = editAppointment;
        window.deleteAppointment = deleteAppointment;
        window.getStatusLabel = getStatusLabel;
        window.populatePatientDropdown = populatePatientDropdown;
        window.renderAgenda = renderAgenda;
        window.loadFilteredAppointments = loadFilteredAppointments;
        window.addToGoogleCalendar = addToGoogleCalendar;
        window.showCalendarView = showCalendarView;
        window.closeCalendarModal = closeCalendarModal;
        window.openTramosModal = openTramosModal;
        window.closeTramosModal = closeTramosModal;

        window.handleDragStart = function(e, appointmentId) {
            const app = appointments.find(a => a.id === appointmentId);
            if (app && app.estado === 'completed') {
                showToast("No se puede mover una cita ya realizada.", "error");
                e.preventDefault();
                return;
            }
            e.dataTransfer.setData('text/plain', appointmentId);
            e.target.style.opacity = '0.5';
        };

        window.handleDragEnd = function(e) {
            e.target.style.opacity = '1';
        };

        window.handleDragOver = function(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            e.currentTarget.style.background = '#e3f2fd';
        };

        window.handleDragLeave = function(e) {
            e.currentTarget.style.background = '';
        };

        window.handleDrop = async function(e, targetDate, targetTime) {
            e.preventDefault();
            e.currentTarget.style.background = '';
            const appointmentId = e.dataTransfer.getData('text/plain');
            if (!appointmentId) return;

            const app = appointments.find(a => a.id === appointmentId);
            if (!app) return;

            // Si es el mismo destino, no hacemos nada
            if (app.fecha === targetDate && app.hora === targetTime) return;

            // 1.- Controlar que no esté realizada la sesión
            if (app.estado === 'completed') {
                showToast("No se puede mover una cita ya realizada.", "error");
                return;
            }

            // 2.- Pedir confirmación
            const confirmMsg = `¿Desea mover la cita de ${app.paciente} al día ${window.formatDate(targetDate)} a las ${targetTime}?`;
            if (confirm(confirmMsg)) {
                try {
                    // Actualizar en Firestore
                    await updateDoc(uDoc("citas", appointmentId), {
                        fecha: targetDate,
                        hora: targetTime,
                        estado: 'pending' // Asegurar que sea Pendiente si se mueve (aunque ya lo debería ser)
                    });
                    showToast("Cita movida correctamente.", "success");
                    // Recargar vistas
                    loadFilteredAppointments();
                    openTramosModal(targetDate); // Refrescar el modal de tramos
                } catch (error) {
                    console.error("Error al mover la cita:", error);
                    showToast("Error al mover la cita.", "error");
                }
            }
        };

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            currentUid = user.uid;
            
            // Cargar nombre del facultativo
            try {
                const snap = await getDoc(doc(db, 'usuarios', user.uid, 'facultativo', 'perfil'));
                const nameEl = document.getElementById('user-name');
                if (nameEl) {
                    if (snap.exists()) {
                        const d = snap.data();
                        const fullName = [d.nombre, d.apellidos].filter(Boolean).join(' ');
                        nameEl.textContent = fullName || user.email;
                    } else {
                        nameEl.textContent = user.email;
                    }
                }
            } catch(e) { 
                console.error("Error cargando perfil:", e);
                const nameEl = document.getElementById('user-name');
                if (nameEl) nameEl.textContent = user.email;
            }

            init();
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
    </script>
