<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes - PsicoFact</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none;">
                <span class="brand-name"><strong>P</strong>sico<strong>F</strong>act</span>
            </a>
        </div>
    </header>

    <main class="container">
        <div class="agenda-container">
            <div class="agenda-header">
                <h2>Gestión de Pacientes</h2>
                <div class="agenda-actions">
                    <button class="btn-turquesa" style="border:none; cursor:pointer;" onclick="openModal()">+ Nuevo Paciente</button>
                    <a href="index.html" class="home-icon" title="Inicio">🏠</a>
                    <a href="configuracion.html" class="back-link">&larr; Volver</a>
                </div>
            </div>

            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" class="search-input" placeholder="Buscar por nombre o apellidos..." oninput="handleSearch()">
            </div>
            
            <table class="agenda-table">
                <thead>
                    <tr>
                        <th class="sortable" onclick="handleSort('nombre')">Nombre</th>
                        <th class="sortable" onclick="handleSort('apellidos')">Apellidos</th>
                        <th>Referencia</th>
                        <th>Teléfono</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="patients-body"></tbody>
            </table>

            <div class="pagination">
                <button class="btn-turquesa" id="prev-page" onclick="changePage(-1)">Anterior</button>
                <span id="page-info">Página 1 de 1</span>
                <button class="btn-turquesa" id="next-page" onclick="changePage(1)">Siguiente</button>
            </div>
        </div>
    </main>

    <!-- Modal para Nuevo Paciente (Reutilizado) -->
    <div id="modalPaciente" class="modal">
        <div class="modal-content">
            <div class="agenda-header">
                <h2>Nuevo Paciente</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <form id="form-paciente" class="form-grid">
                <div class="form-group">
                    <label for="referencia">Referencia (auto)</label>
                    <input type="text" id="referencia" name="referencia" readonly style="background-color:#f0f0f0; font-weight:600; letter-spacing:1px;">
                </div>
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="form-group">
                    <label for="apellidos">Apellidos</label>
                    <input type="text" id="apellidos" name="apellidos" required>
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" required>
                </div>
                <div class="form-group">
                    <label for="fechaNacimiento">Fecha de Nacimiento</label>
                    <input type="date" id="fechaNacimiento" name="fechaNacimiento">
                </div>
                <div class="form-group">
                    <label for="sociedad">Sociedad</label>
                    <select id="sociedad" name="sociedad" required>
                        <option value="">Seleccione...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="clinica">Clínica</label>
                    <select id="clinica" name="clinica" required>
                        <option value="">Seleccione...</option>
                    </select>
                </div>
                <div class="form-group full-width">
                    <label for="notas">Notas</label>
                    <textarea id="notas" name="notas" rows="3"></textarea>
                </div>
                <div class="form-actions full-width">
                    <button type="submit" class="btn-turquesa">Guardar Paciente</button>
                    <button type="button" class="back-link" style="border:none; background:none; cursor:pointer;" onclick="closeModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, orderBy, query } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUgTAvRE0IhFq3snlwPIwTkZn7eJU6Tyk",
            authDomain: "psicofact-404ba.firebaseapp.com",
            projectId: "psicofact-404ba",
            storageBucket: "psicofact-404ba.firebasestorage.app",
            messagingSenderId: "216824213435",
            appId: "1:216824213435:web:282a094dbf842db8719e9e",
            measurementId: "G-CNG232R6TW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUid = null;
        const uCol = (name) => collection(db, "usuarios", currentUid, name);
        const uDoc = (name, id) => doc(db, "usuarios", currentUid, name, id);

        // ── Generar referencia de paciente: 3 iniciales + número consecutivo desde 1001 ──
        function getInitials(nombre, apellidos) {
            const n = (nombre.trim().split(/\s+/)[0] || '').charAt(0).toUpperCase();
            const parts = apellidos.trim().split(/\s+/);
            const a1 = (parts[0] || '').charAt(0).toUpperCase();
            const a2 = parts.length > 1
                ? (parts[1] || '').charAt(0).toUpperCase()
                : (parts[0] || '').charAt(1).toUpperCase();
            return `${n}${a1}${a2 || 'X'}`;
        }

        async function generateReferencia(nombre, apellidos) {
            const initials = getInitials(nombre, apellidos);
            const snap = await getDocs(uCol("pacientes"));
            let maxNum = 1000;
            snap.docs.forEach(d => {
                const ref = d.data().referencia || '';
                const parts = ref.split('-');
                if (parts.length === 2) {
                    const num = parseInt(parts[1], 10);
                    if (!isNaN(num) && num > maxNum) maxNum = num;
                }
            });
            return `${initials}-${maxNum + 1}`;
        }

        // Autocompletar referencia al escribir nombre/apellidos (se registra después de que editingId esté declarado)
        function setupRefListeners() {
            ['nombre', 'apellidos'].forEach(field => {
                document.getElementById(field).addEventListener('blur', async () => {
                    if (editingId) return; // Solo en alta nueva
                    const nombre = document.getElementById('nombre').value.trim();
                    const apellidos = document.getElementById('apellidos').value.trim();
                    if (nombre && apellidos) {
                        document.getElementById('referencia').value = await generateReferencia(nombre, apellidos);
                    }
                });
            });
        }

        function showToast(message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => container.removeChild(toast), 300);
            }, 3500);
        }

        let patients = [];
        let editingId = null;

        async function loadData() {
            // Cargar Clínicas y Sociedades desde Firestore para los desplegables
            const snapshotClinicas = await getDocs(query(uCol("clinicas"), orderBy("nombre")));
            const snapshotSociedades = await getDocs(query(uCol("sociedades"), orderBy("nombre")));
            
            const selectClinica = document.getElementById('clinica');
            const selectSociedad = document.getElementById('sociedad');
            selectClinica.innerHTML = '<option value="">Seleccione...</option>';
            selectSociedad.innerHTML = '<option value="">Seleccione...</option>';

            snapshotClinicas.forEach(c => {
                const nombre = c.data().nombre;
                selectClinica.innerHTML += `<option value="${nombre}">${nombre}</option>`;
            });
            snapshotSociedades.forEach(s => {
                const nombre = s.data().nombre;
                selectSociedad.innerHTML += `<option value="${nombre}">${nombre}</option>`;
            });

            // Cargar Pacientes
            const querySnapshot = await getDocs(uCol("pacientes"));
            patients = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderTable();
        }

        function renderTable() {
            const tbody = document.getElementById('patients-body');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filtered = patients.filter(p => 
                p.nombre.toLowerCase().includes(searchTerm) || 
                p.apellidos.toLowerCase().includes(searchTerm)
            );
            tbody.innerHTML = '';
            filtered.forEach(p => {
                tbody.innerHTML += `<tr>
                    <td>${p.nombre}</td>
                    <td>${p.apellidos}</td>
                    <td><strong>${p.referencia || '-'}</strong></td>
                    <td>${p.telefono || '-'}</td>
                    <td style="text-align: center;">
                        <a href="javascript:void(0)" class="action-icon" onclick="editPatient('${p.id}')" title="Editar">✏️</a>
                        <a href="javascript:void(0)" class="action-icon" onclick="deletePatient('${p.id}')" title="Eliminar">🗑️</a>
                    </td></tr>`;
            });
        }

        function handleSearch() { renderTable(); }
        function handleSort() {} 
        function changePage() {}

        function openModal(title = "Nuevo Paciente") {
            const modal = document.getElementById('modalPaciente');
            modal.querySelector('h2').textContent = title;
            if (title === "Nuevo Paciente") { document.getElementById('form-paciente').reset(); editingId = null; }
            modal.style.display = 'flex';
        }
        function closeModal() { document.getElementById('modalPaciente').style.display = 'none'; }
        
        function editPatient(id) {
            const p = patients.find(p => p.id === id);
            editingId = id;
            ['referencia', 'nombre', 'apellidos', 'telefono', 'fechaNacimiento', 'sociedad', 'clinica', 'notas'].forEach(f => {
                const el = document.getElementById(f);
                const value = (f === 'notas') ? (p.notas || p.observaciones) : p[f];
                if (el) el.value = value || '';
            });
            openModal("Editar Paciente");
        }

        async function deletePatient(id) {
            if (confirm("¿Está seguro de que desea eliminar este paciente?")) {
                await deleteDoc(uDoc("pacientes", id));
                showToast("Paciente eliminado");
                loadData();
            }
        }

        document.getElementById('form-paciente').onsubmit = async function(e) {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            if (editingId) {
                await updateDoc(uDoc("pacientes", editingId), data);
                showToast("Paciente actualizado");
            } else {
                // Generar referencia si no tiene ya
                if (!data.referencia) {
                    data.referencia = await generateReferencia(data.nombre || '', data.apellidos || '');
                }
                await addDoc(uCol("pacientes"), data);
                showToast("Paciente registrado");
            }
            loadData(); closeModal();
        };

        window.onclick = (e) => { if (e.target == document.getElementById('modalPaciente')) closeModal(); }

        // Exponer funciones al objeto window
        window.handleSearch = handleSearch;
        window.handleSort = handleSort;
        window.changePage = changePage;
        window.openModal = openModal;
        window.closeModal = closeModal;
        window.editPatient = editPatient;
        window.deletePatient = deletePatient;
        window.renderTable = renderTable;

        onAuthStateChanged(auth, (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            currentUid = user.uid;
            setupRefListeners();
            loadData();
        });
    </script>
</body>
</html>
