<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expediente del Paciente - PsicoFact</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none; display: flex; align-items: center;">
                <img src="img/solo_psia_peque.PNG" alt="PsicoFact Logo" class="logo-img">
                <span class="brand-name"><strong>P</strong>sico<strong>F</strong>act</span>
            </a>
        </div>
        <div class="user-info-container">
            <button class="btn-logout" id="logout-btn">Cerrar sesión</button>
            <span id="user-name"></span>
        </div>
    </header>

    <main class="container">
        <div class="agenda-header" style="text-align: left;">
            <h2 id="expediente-titulo">Expediente: Cargando...</h2>
            <div class="agenda-actions">
                <a href="#" id="link-evaluacion" title="Nueva Evaluación"><img src="img/Psia.png" alt="Evaluación" style="width: 28px; vertical-align: middle; margin-right: 5px;"></a>
                <a href="index.html" class="home-icon" title="Inicio">🏠</a>
                <a href="Con_pacientes.html" class="back-link">&larr; Volver</a>
            </div>
        </div>

        <!-- Ficha del Paciente -->
        <section class="agenda-container" style="margin-bottom: 2rem;">
            <h3 style="color: var(--azul-oscuro); margin-bottom: 1rem;">Datos Personales</h3>
            <div id="ficha-paciente" class="form-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                <!-- Se rellena con JS -->
            </div>
        </section>

        <!-- Historial de Citas -->
        <section class="agenda-container">
            <h3 style="color: var(--azul-oscuro); margin-bottom: 1rem;">Historial de Citas</h3>
            <table class="agenda-table">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Clínica</th>
                        <th>Observaciones <a href="javascript:void(0)" onclick="showAllNotes()" title="Ver resumen de notas" style="text-decoration:none; margin-left:5px;">📄</a></th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="historial-citas">
                    <!-- Se rellena con JS -->
                </tbody>
            </table>
        </section>

        <!-- Resumen del Expediente -->
        <div id="resumen-expediente" class="agenda-container" style="margin-top: 1.5rem; background-color: #f1faff; border-left: 5px solid var(--azul-primario); display: none;">
            <!-- Se rellena con JS -->
        </div>
    </main>

    <!-- Modal para Resumen de Notas -->
    <div id="modalNotas" class="modal">
        <div class="modal-content" style="max-width: 800px;">
            <div class="agenda-header">
                <h2>Resumen de Evolución</h2>
                <div style="display: flex; gap: 15px; align-items: center;">
                    <a href="javascript:void(0)" onclick="printNotes()" title="Imprimir" style="text-decoration:none; font-size: 1.4rem;">🖨️</a>
                    <button class="btn-turquesa" onclick="copyNotes()" style="padding: 5px 12px; font-size: 0.85rem;">Copiar Texto</button>
                    <span class="close-modal" onclick="closeNotesModal()">&times;</span>
                </div>
            </div>
            <div id="notas-content" style="white-space: pre-wrap; margin-top: 1.5rem; max-height: 500px; overflow-y: auto; text-align: left; line-height: 1.8; border: 1px solid #eee; padding: 15px; border-radius: 8px;">
            </div>
            <div class="form-actions full-width" style="justify-content: flex-end; margin-top: 20px;">
                <button type="button" class="btn-turquesa" onclick="closeNotesModal()">Cerrar</button>
            </div>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 PsicoFact - Gestión de Psicología</p>
    </footer>

    <script src="js/config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = window.APP_CONFIG.firebase;

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUid = null;
        let currentPatientName = '';
        let patientAppsData = [];
        const uDoc = (name, id) => doc(db, "usuarios", currentUid, name, id);
        const uCol = (name) => collection(db, "usuarios", currentUid, name);

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const [year, month, day] = dateStr.split('-');
            return `${day}-${month}-${year}`;
        }

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            currentUid = user.uid;

            // Cargar nombre del facultativo
            try {
                const snap = await getDoc(doc(db, 'usuarios', user.uid, 'facultativo', 'perfil'));
                const nameEl = document.getElementById('user-name');
                if (nameEl) {
                    if (snap.exists()) {
                        const d = snap.data();
                        const fullName = [d.nombre, d.apellidos].filter(Boolean).join(' ');
                        nameEl.textContent = fullName || user.email;
                    } else {
                        nameEl.textContent = user.email;
                    }
                }
            } catch(e) { 
                console.error("Error cargando perfil:", e);
                const nameEl = document.getElementById('user-name');
                if (nameEl) nameEl.textContent = user.email;
            }

            loadExpediente();
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        async function loadExpediente() {
            const params = new URLSearchParams(window.location.search);
            const patientId = params.get('id');
            if (!patientId) {
                alert("No se ha especificado un ID de paciente.");
                window.location.href = 'Con_pacientes.html';
                return;
            }

            try {
                // 1. Cargar datos del paciente
                const pSnap = await getDoc(uDoc('pacientes', patientId));
                if (!pSnap.exists()) {
                    alert("Paciente no encontrado.");
                    window.location.href = 'Con_pacientes.html';
                    return;
                }
                const p = pSnap.data();
                currentPatientName = `${p.nombre} ${p.apellidos}`;
                document.getElementById('expediente-titulo').textContent = `Expediente: ${currentPatientName}`;
                document.getElementById('link-evaluacion').href = `evaluacion.html?id=${patientId}`;

                const ficha = document.getElementById('ficha-paciente');
                ficha.innerHTML = `
                    <div class="form-group"><label>Referencia</label><p><strong>${p.referencia || '-'}</strong></p></div>
                    <div class="form-group"><label>Teléfono</label><p>${p.telefono || '-'}</p></div>
                    <div class="form-group"><label>Sociedad</label><p>${p.sociedad || '-'}</p></div>
                    <div class="form-group"><label>Clínica</label><p>${p.clinica || '-'}</p></div>
                    <div class="form-group"><label>Fecha Nac.</label><p>${p.fechaNacimiento || '-'}</p></div>
                    <div class="form-group full-width"><label>Notas Generales</label><p>${p.notas || p.observaciones || '-'}</p></div>
                `;

                // 2. Cargar historial de citas (filtrado por paciente)
                // Nota: Usamos filter en el cliente para evitar requerir índices compuestos complejos de Firestore 
                // para cada combinación de paciente/fecha si no son necesarios.
                const q = query(uCol('citas'));
                const cSnap = await getDocs(q);
                
                const tbody = document.getElementById('historial-citas');
                tbody.innerHTML = '';
                
                patientAppsData = [];
                cSnap.forEach(doc => {
                    const c = doc.data();
                    // Filtramos por referencia o por nombre exacto
                    if (c.referenciaPaciente === p.referencia || (c.paciente === currentPatientName)) {
                        patientAppsData.push({ id: doc.id, ...c });
                    }
                });

                // Ordenar por fecha descendente manualmente
                patientAppsData.sort((a, b) => b.fecha.localeCompare(a.fecha));

                patientAppsData.forEach(c => {
                    const statusLabel = c.estado === 'completed' ? 'Realizada' : (c.estado === 'cancelled' ? 'Cancelada' : 'Pendiente');
                    tbody.innerHTML += `
                        <tr class="${c.estado === 'cancelled' ? 'row-cancelled' : ''}">
                            <td>${formatDate(c.fecha)}</td>
                            <td>${c.hora || '-'}</td>
                            <td>${c.clinica || '-'}</td>
                            <td>${c.observaciones || c.obs || '-'}</td>
                            <td><span class="status-pill ${c.estado}">${statusLabel}</span></td>
                        </tr>
                    `;
                });

                if (patientAppsData.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: #95a5a6;">No hay citas registradas</td></tr>';
                }

            } catch (error) {
                console.error("Error cargando expediente:", error);
                alert("Error al cargar los datos del expediente.");
            }
        }

        window.showAllNotes = function() {
            const content = document.getElementById('notas-content');
            if (patientAppsData.length === 0) {
                content.innerHTML = "<em>No hay citas registradas para este paciente.</em>";
            } else {
                let html = `<h3 style="margin-bottom: 10px; border-bottom: 1px solid #ddd; padding-bottom: 5px;">Paciente: ${currentPatientName}</h3>`;
                html += patientAppsData.map(a => {
                    const obs = a.observaciones || a.obs || 'Sin observaciones';
                    return `<strong>${a.fecha}</strong> / ${obs}`;
                }).join('<br>');
                content.innerHTML = html;
            }
            document.getElementById('modalNotas').style.display = 'flex';
        }

        window.copyNotes = function() {
            const contentText = document.getElementById('notas-content').innerText;
            navigator.clipboard.writeText(contentText).then(() => {
                alert("Resumen copiado al portapapeles");
            }).catch(err => {
                console.error('Error al copiar: ', err);
            });
        }

        window.printNotes = function() {
            const content = document.getElementById('notas-content').innerHTML;
            const printWindow = window.open('', '', 'height=600,width=800');
            printWindow.document.write('<html><head><title>Resumen de Evolución - ' + currentPatientName + '<\/title>');
            printWindow.document.write('<style>body{font-family: "Segoe UI", Tahoma, sans-serif; line-height: 1.6; padding: 40px; color: #333;} h3{border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 20px;} strong{color: #2c3e50;}<\/style>');
            printWindow.document.write('<\/head><body>');
            printWindow.document.write(content);
            printWindow.document.write('<\/body><\/html>');
            printWindow.document.close();
            printWindow.print();
        }

        window.closeNotesModal = function() {
            document.getElementById('modalNotas').style.display = 'none';
        }

        // Cerrar modal al hacer clic fuera
        window.onclick = function(event) {
            const modal = document.getElementById('modalNotas');
            if (event.target == modal) closeNotesModal();
        }
    </script>
</body>
</html>
