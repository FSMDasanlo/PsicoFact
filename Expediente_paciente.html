<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expediente del Paciente - PsicoFact</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none;">
                <span class="brand-name"><strong>P</strong>sico<strong>F</strong>act</span>
            </a>
        </div>
        <div class="header-date" id="current-date"></div>
    </header>

    <main class="container">
        <div class="agenda-header" style="text-align: left;">
            <h2 id="expediente-titulo">Expediente: Cargando...</h2>
            <div class="agenda-actions">
                <a href="index.html" class="home-icon" title="Inicio">🏠</a>
                <a href="Con_pacientes.html" class="back-link">&larr; Volver</a>
            </div>
        </div>

        <!-- Ficha del Paciente -->
        <section class="agenda-container" style="margin-bottom: 2rem;">
            <h3 style="color: var(--azul-oscuro); margin-bottom: 1rem;">Datos Personales</h3>
            <div id="ficha-paciente" class="form-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                <!-- Se rellena con JS -->
            </div>
        </section>

        <!-- Historial de Citas -->
        <section class="agenda-container">
            <h3 style="color: var(--azul-oscuro); margin-bottom: 1rem;">Historial de Citas</h3>
            <table class="agenda-table">
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Hora</th>
                        <th>Clínica</th>
                        <th>Observaciones</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="historial-citas">
                    <!-- Se rellena con JS -->
                </tbody>
            </table>
        </section>

        <!-- Resumen del Expediente -->
        <div id="resumen-expediente" class="agenda-container" style="margin-top: 1.5rem; background-color: #f1faff; border-left: 5px solid var(--azul-primario); display: none;">
            <!-- Se rellena con JS -->
        </div>
    </main>

    <footer>
        <p>&copy; 2026 PsicoFact - Gestión de Psicología</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUgTAvRE0IhFq3snlwPIwTkZn7eJU6Tyk",
            authDomain: "psicofact-404ba.firebaseapp.com",
            projectId: "psicofact-404ba",
            storageBucket: "psicofact-404ba.firebasestorage.app",
            messagingSenderId: "216824213435",
            appId: "1:216824213435:web:282a094dbf842db8719e9e",
            measurementId: "G-CNG232R6TW"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Mostrar fecha actual
        const dateElement = document.getElementById('current-date');
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        dateElement.textContent = new Date().toLocaleDateString('es-ES', dateOptions);

        const urlParams = new URLSearchParams(window.location.search);
        const patientId = urlParams.get('id');

        async function loadExpediente() {
            if (!patientId) return;
            
            const docSnap = await getDoc(doc(db, "pacientes", patientId));
            if (!docSnap.exists()) return;
            const patient = docSnap.data();

            document.getElementById('expediente-titulo').textContent = `Expediente: ${patient.nombre} ${patient.apellidos}`;
            
            const ficha = document.getElementById('ficha-paciente');
            ficha.innerHTML = `
                <div><strong>Teléfono:</strong><br>${patient.telefono}</div>
                <div><strong>Sociedad:</strong><br>${patient.sociedad}</div>
                <div><strong>Clínica:</strong><br>${patient.clinica}</div>
                <div class="full-width" style="margin-top:10px;"><strong>Notas:</strong><br>${patient.notas || patient.observaciones || 'Sin notas'}</div>
            `;

            const historialTbody = document.getElementById('historial-citas');
            // Buscamos citas por el nombre del paciente o ID si lo guardas así
            const q = query(collection(db, "citas"), where("paciente", "==", `${patient.nombre} ${patient.apellidos}`));
            const snapCitas = await getDocs(q);
            const patientApps = snapCitas.docs.map(d => d.data());
            
            if (patientApps.length > 0) {
                patientApps.forEach(a => {
                    const estadoLabel = a.estado === 'completed' ? 'Realizada' : 'Pendiente';
                    historialTbody.innerHTML += `
                        <tr>
                            <td>${a.fecha}</td>
                            <td>${a.hora}</td>
                            <td>${a.clinica}</td>
                            <td><small>${a.observaciones || ''}</small></td>
                            <td><span class="status-pill ${a.estado}">${estadoLabel}</span></td>
                        </tr>
                    `;
                });
            } else {
                historialTbody.innerHTML = `<tr><td colspan="5" style="text-align: center;">No hay citas registradas</td></tr>`;
            }

            const realizadas = patientApps.filter(a => a.estado === 'completed').length;
            const pendientes = patientApps.filter(a => a.estado === 'pending').length;
            const pagado = patientApps
                .filter(a => a.estado === 'completed')
                .reduce((acc, a) => acc + (parseFloat(a.importe) || 0), 0);

            const resumenDiv = document.getElementById('resumen-expediente');
            resumenDiv.style.display = 'block';
            resumenDiv.innerHTML = `
                Sesiones realizadas: <strong>${realizadas}</strong>, Sesiones pendientes: <strong>${pendientes}</strong> &nbsp; | &nbsp; <strong>Importe pagado:</strong> ${pagado.toFixed(2)} €
            `;
        }
        loadExpediente();
    </script>
</body>
</html>
