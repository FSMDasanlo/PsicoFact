<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clínicas - PsicoFact</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="navbar">
        <div class="logo-container">
            <a href="index.html" style="text-decoration: none; display: flex; align-items: center;">
                <img src="img/solo_psia_peque.PNG" alt="PsicoFact Logo" class="logo-img">
                <span class="brand-name"><strong>P</strong>sico<strong>F</strong>act</span>
            </a>
        </div>
        <div class="user-info-container">
            <button class="btn-logout" id="logout-btn">Cerrar sesión</button>
            <span id="user-name"></span>
        </div>
    </header>

    <main class="container">
        <div class="agenda-container">
            <div class="agenda-header">
                <h2>Gestión de Clínicas</h2>
                <div class="agenda-actions">
                    <button class="btn-turquesa" style="border:none; cursor:pointer;" onclick="openModal()">+ Nueva Clínica</button>
                    <a href="index.html" class="home-icon" title="Inicio">🏠</a>
                    <a href="configuracion.html" class="back-link">&larr; Volver</a>
                </div>
            </div>

            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" id="search-input" class="search-input" placeholder="Buscar por nombre o contacto..." oninput="handleSearch()">
            </div>
            
            <table class="agenda-table">
                <thead>
                    <tr>
                        <th class="sortable" onclick="handleSort('nombre')">Nombre</th>
                        <th class="sortable" onclick="handleSort('contacto')">Responsable</th>
                        <th>Teléfono</th>
                        <th>CIF/NIF</th>
                        <th>Importe Clínica</th>
                        <th>% Facul.</th>
                        <th style="text-align: center;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="clinics-body"></tbody>
            </table>

            <div class="pagination">
                <button class="btn-turquesa" id="prev-page" onclick="changePage(-1)">Anterior</button>
                <span id="page-info">Página 1 de 1</span>
                <button class="btn-turquesa" id="next-page" onclick="changePage(1)">Siguiente</button>
            </div>
        </div>
    </main>

    <!-- Modal para Clínica -->
    <div id="modalClinica" class="modal">
        <div class="modal-content">
            <div class="agenda-header">
                <h2>Nueva Clínica</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <form id="form-clinica" class="form-grid">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="form-group">
                    <label for="cif">CIF/NIF</label>
                    <input type="text" id="cif" name="cif">
                </div>
                <div class="form-group">
                    <label for="contacto">Responsable / Contacto</label>
                    <input type="text" id="contacto" name="contacto">
                </div>
                <div class="form-group">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">
                </div>
                <div class="form-group full-width">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" name="direccion">
                </div>
                <div class="form-group">
                    <label for="importe">Importe por sesión clínica (€)</label>
                    <input type="number" id="importe" name="importe" step="0.01">
                </div>
                <div class="form-group">
                    <label for="porcentaje_facultativo">% Facultativo</label>
                    <input type="number" id="porcentaje_facultativo" name="porcentaje_facultativo" step="0.1" min="0" max="100" placeholder="Ej: 70">
                </div>
                <div class="form-actions full-width">
                    <button type="submit" class="btn-turquesa">Guardar Clínica</button>
                    <button type="button" class="back-link" style="border:none; background:none; cursor:pointer;" onclick="closeModal()">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = window.APP_CONFIG.firebase;

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentUid = null;
        const uCol = (name) => collection(db, "usuarios", currentUid, name);
        const uDoc = (name, id) => doc(db, "usuarios", currentUid, name, id);

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            currentUid = user.uid;

            // Cargar nombre del facultativo
            try {
                const snap = await getDoc(doc(db, 'usuarios', user.uid, 'facultativo', 'perfil'));
                const nameEl = document.getElementById('user-name');
                if (nameEl) {
                    if (snap.exists()) {
                        const d = snap.data();
                        const fullName = [d.nombre, d.apellidos].filter(Boolean).join(' ');
                        nameEl.textContent = fullName || user.email;
                    } else {
                        nameEl.textContent = user.email;
                    }
                }
            } catch(e) { 
                console.error("Error cargando perfil:", e);
                const nameEl = document.getElementById('user-name');
                if (nameEl) nameEl.textContent = user.email;
            }

            loadClinics();
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));

        function showToast(message, type = 'success') {
            let container = document.getElementById('toast-container');
            if (!container) {
                container = document.createElement('div');
                container.id = 'toast-container';
                document.body.appendChild(container);
            }
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => container.removeChild(toast), 300);
            }, 3500);
        }

        const dateElement = null; // fecha eliminada
        let clinics = [];
        let editingId = null;

        async function loadClinics() {
            const querySnapshot = await getDocs(uCol("clinicas"));
            clinics = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            renderTable();
        }

        window.renderTable = function() {
            const tbody = document.getElementById('clinics-body');
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filtered = clinics.filter(c => c.nombre.toLowerCase().includes(searchTerm) || c.contacto.toLowerCase().includes(searchTerm));
            tbody.innerHTML = '';
            filtered.forEach(c => {
                tbody.innerHTML += `<tr><td>${c.nombre}</td><td>${c.contacto}</td><td>${c.telefono}</td><td>${c.cif || ''}</td><td>${parseFloat(c.importe || 0).toFixed(2)} €</td><td>${c.porcentaje_facultativo || 0}%</td>
                    <td style="text-align: center;">
                        <a href="javascript:void(0)" class="action-icon" onclick="editClinic('${c.id}')">✏️</a>
                        <a href="javascript:void(0)" class="action-icon" onclick="deleteClinic('${c.id}')">🗑️</a>
                    </td></tr>`;
            });
        }

        window.handleSearch = () => renderTable();
        window.handleSort = () => {}; 
        window.changePage = () => {};

        window.openModal = function(title = "Nueva Clínica") {
            const modal = document.getElementById('modalClinica');
            modal.querySelector('h2').textContent = title;
            if (title === "Nueva Clínica") { document.getElementById('form-clinica').reset(); editingId = null; }
            modal.style.display = 'flex';
        }
        window.closeModal = function() { document.getElementById('modalClinica').style.display = 'none'; }
        
        window.editClinic = function(id) {
            const c = clinics.find(c => c.id === id);
            editingId = id;
            ['nombre', 'cif', 'contacto', 'direccion', 'telefono', 'email', 'importe', 'porcentaje_facultativo'].forEach(f => document.getElementById(f).value = c[f] || '');
            openModal("Editar Clínica");
        }
        
        window.deleteClinic = async function(id) { 
            if (confirm("¿Eliminar esta clínica?")) { 
                await deleteDoc(uDoc("clinicas", id));
                showToast("Clínica eliminada");
                loadClinics();
            } 
        }

        document.getElementById('form-clinica').onsubmit = async (e) => {
            e.preventDefault();
            const data = Object.fromEntries(new FormData(e.target));
            if (editingId) {
                await updateDoc(uDoc("clinicas", editingId), data);
                showToast("Clínica actualizada");
            } else {
                await addDoc(uCol("clinicas"), data);
                showToast("Clínica guardada");
            }
            loadClinics(); closeModal();
        };

        window.onclick = (e) => { if (e.target == document.getElementById('modalClinica')) closeModal(); }
    </script>
</body>
</html>
